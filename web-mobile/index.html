<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/jpeg" href="/favicon.jpeg">
    <title>Bracket Creator Mobile</title>
    <base href="/">
    <link rel="stylesheet" href="/css/styles.css">

    <!-- Load Preact locally -->
    <script src="/vendor/preact.min.js"></script>
    <script src="/vendor/hooks.umd.js"></script>
    <script src="/vendor/compat.umd.js"></script>
    <script src="/vendor/preact-router.umd.js"></script>

    <script>
        console.log("Preact loaded:", !!window.preact);
        console.log("PreactHooks loaded:", !!window.preactHooks);
        console.log("PreactCompat loaded:", !!window.preactCompat);
        console.log("PreactRouter loaded:", !!window.preactRouter);

        // Alias for React/ReactDOM compatibility
        window.React = window.preactCompat;
        window.ReactDOM = window.preactCompat;

        // React 18 createRoot polyfill for Preact.
        window.ReactDOM.createRoot = (container) => {
            let mounted = false;
            return {
                render: (children) => {
                    console.log("Mounting application...");
                    // React's createRoot().render() REPLACES the container's
                    // existing DOM. Preact's render() instead diffs/appends, so
                    // the server-rendered static "Loading…" placeholder (the
                    // .loading-page child of #root) survives the first mount and
                    // re-appears when the user scrolls to the top. Clear it on the
                    // initial mount so Preact owns #root outright; subsequent
                    // renders diff Preact's own tree and must NOT be wiped.
                    if (!mounted) {
                        // replaceChildren() is the clean modern API, but fall
                        // back to innerHTML on the off chance it's missing, this
                        // is the critical mount path; it must never throw before
                        // the app renders.
                        if (typeof container.replaceChildren === "function") {
                            container.replaceChildren();
                        } else {
                            container.innerHTML = "";
                        }
                        mounted = true;
                    }
                    window.preact.render(children, container);
                }
            };
        };
    </script>

</head>

<body>
    <div id="root">
      <!-- Static spinner shown while JS modules load. Preact replaces
           #root children on mount, so this vanishes automatically. -->
      <div class="loading-page" role="status" aria-live="polite">
        <div class="loading-spinner" aria-hidden="true"></div>
        <div class="loading-text">Loading…</div>
      </div>
    </div>

    <!-- Modules that are BOTH script-tagged here AND ES-imported by other modules
         (e.g. patch.jsx imports data.jsx/api_serializers.jsx; app.jsx imports
         patch.jsx) use the ".jsx" specifier, identical to the import URL, so the
         browser keys them as ONE module and evaluates them once. Using ".js?v=5"
         here would be a second, distinct URL → double module-eval (mp-zd1v).
         They keep their early position so the window globals they set are
         available to eval-time readers in later modules. -->
    <script type="module" src="/dist/api_serializers.jsx"></script>
    <script type="module" src="/dist/api_client.js?v=5"></script>
    <script type="module" src="/dist/data.jsx"></script>
    <script type="module" src="/dist/patch.jsx"></script>
    <script type="module" src="/dist/router.js?v=5"></script>
    <script type="module" src="/dist/bracket.js?v=5"></script>
    <script type="module" src="/dist/ui.js?v=5"></script>
    <!-- glossary_data.js is generated from internal/domain/glossary.go
         via `go generate` (runs as part of `make go/build`). glossary.jsx
         (compiled to dist/glossary.js) imports it via a relative path. -->
    <script type="module" src="/dist/glossary.js?v=5"></script>
    <script type="module" src="/dist/reset.js?v=5"></script>
    <script type="module" src="/dist/registration.js?v=5"></script>
    <!-- sponsor_strip.js exports SponsorStrip to window. Must load before
         display.js and viewer.js, both consume window.SponsorStrip (mp-c38). -->
    <script type="module" src="/dist/sponsor_strip.js?v=5"></script>
    <!-- qr.js exposes window.renderQR; must load before display.js so the
         StreamingOverlay's QR ("scan for results") can draw. -->
    <script type="module" src="/dist/qr.js?v=5"></script>
    <!-- display.js exports queueLabel / queueLabelCompact to window for the
         viewer pills. Must load *before* viewer.js so the first viewer render
         picks up the labels. -->
    <script type="module" src="/dist/display.js?v=5"></script>
    <!-- Viewer modules (mp-pxxc split). viewer.js statically imports all ten
         viewer_* helper modules (viewer_utils, viewer_watchlist_core, viewer_alerts,
         viewer_notifications, viewer_match, viewer_standings, viewer_awards,
         viewer_schedule, viewer_competition, viewer_home), so it is the SOLE entry
         that loads them, they must NOT also have their own <script type="module">
         tags. A separate tag uses a different module URL (".js?v=5") than the import
         specifier (".jsx"), which the browser keys as a distinct module and would
         evaluate a SECOND time, doubling the viewer JS download/parse and splitting
         module-level singleton state across two instances.
         viewer_watchlist.js is the one exception: viewer.js does NOT import it (it is
         wired via window.* lazy reads at render time, forming a deliberate runtime
         cycle with viewer_home.jsx), so it keeps its own tag and loads exactly once.
         It reads only window.pluralize (from ui.js, above) at module-eval; the
         viewer.jsx-owned deps it uses are read from window at render time. -->
    <script type="module" src="/dist/viewer_watchlist.js?v=5"></script>
    <script type="module" src="/dist/viewer.js?v=7"></script>
    <script type="module" src="/dist/admin_helpers.jsx"></script>
    <script type="module" src="/dist/admin_shell.js?v=5"></script>
    <script type="module" src="/dist/admin_scoring_modal.js?v=5"></script>
    <script type="module" src="/dist/admin_lineup.js?v=5"></script>
    <script type="module" src="/dist/admin_participants.js?v=5"></script>
    <script type="module" src="/dist/admin_pools.js?v=7"></script>
    <script type="module" src="/dist/admin_schedule.js?v=5"></script>
    <!-- admin_competition.js (mp-hpe3 split) is the SOLE entry that imports the
         four section modules (overview/settings/bracket/swiss). Like the viewer_*
         split (mp-pxxc / mp-zd1v), those modules must NOT also have their own
         <script> tags: a tag would use a different module URL (".js?v=6") than the
         import specifier (".jsx"), so the browser would key it as a distinct module
         and evaluate it a SECOND time. The entry loads/evaluates them via its
         imports; their window.* component globals are set before the entry's alias
         block runs (ES evaluates imports before the importing module body). The
         globals they read (CourtPicker, compMatchStats, …) come from admin_* files
         tagged earlier, which run before this entry in document order. -->
    <script type="module" src="/dist/admin_competition.js?v=6"></script>
    <script type="module" src="/dist/admin_announcement.js?v=5"></script>
    <!-- admin_sponsors.js exports SponsorsManager. Loaded before admin_setup.js
         (which embeds it inside the Edit Tournament page), mp-c38. -->
    <script type="module" src="/dist/admin_sponsors.js?v=5"></script>
    <!-- admin_branding.js exports BrandingManager. Loaded before admin_setup.js
         (which embeds it inside the Edit Tournament page), mp-scf. -->
    <script type="module" src="/dist/admin_branding.jsx"></script>
    <script type="module" src="/dist/admin_setup.js?v=5"></script>
    <!-- admin_shiaijo.js exports AdminShiaijoPage to window. Must load before
         admin.js which reads window.AdminShiaijoPage (mp-c2yr). -->
    <script type="module" src="/dist/admin_shiaijo.js?v=5"></script>
    <!-- admin_registration_desk.js exports AdminRegistrationDeskPage to window.
         Must load before admin.js which reads window.AdminRegistrationDeskPage
         in its "registrationDesk" view branch (mp-25bk). -->
    <script type="module" src="/dist/admin_registration_desk.js?v=5"></script>
    <script type="module" src="/dist/admin.js?v=5"></script>
    <script type="module" src="/dist/app.js?v=5"></script>
</body>

</html>
