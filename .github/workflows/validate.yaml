name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      id-token: write # for codecov/codecov-action to upload coverage without a token
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"

      - name: Init project
        run: |
          go mod tidy
          go generate ./...

      #   ____                       _ _
      #  / ___|  ___  ___ _   _ _ __(_) |_ _   _
      #  \___ \ / _ \/ __| | | | '__| | __| | | |
      #   ___) |  __/ (__| |_| | |  | | |_| |_| |
      #  |____/ \___|\___|\__,_|_|  |_|\__|\__, |
      #                                    |___/
      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: "-no-fail -fmt sarif -out results.sarif ./..."

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

      #   _     _       _
      #  | |   (_)_ __ | |_
      #  | |   | | '_ \| __|
      #  | |___| | | | | |_
      #  |_____|_|_| |_|\__|
      #
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      #   ____             _
      #  |  _ \  ___   ___| | _____ _ __
      #  | | | |/ _ \ / __| |/ / _ \ '__|
      #  | |_| | (_) | (__|   <  __/ |
      #  |____/ \___/ \___|_|\_\___|_|
      #
      - name: Build the Docker image
        run: GH_REPOSITORY="${{ github.repository }}" make VERSION=latest docker/build
      - name: Run the Anchore scan action
        uses: anchore/scan-action@v7
        with:
          image: "ghcr.io/${{ github.repository }}:latest"
          output-format: json

  #   _____         _
  #  |_   _|__  ___| |_
  #    | |/ _ \/ __| __|
  #    | |  __/\__ \ |_
  #    |_|\___||___/\__|
  #
  test:
    permissions:
      contents: read
      id-token: write # for codecov/codecov-action
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    strategy:
      fail-fast: false
      matrix:
        packages:
          - name: cmd
            path: ./cmd/...
          - name: internal
            path: ./internal/...
          - name: integration
            path: ./tests/...
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
          cache: true

      - name: Run tests (${{ matrix.packages.name }})
        run: go test ${{ matrix.packages.path }} -race -coverprofile=coverage-${{ matrix.packages.name }}.txt -covermode=atomic

      - name: Upload coverage to Codecov (${{ matrix.packages.name }})
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-${{ matrix.packages.name }}.txt
          flags: ${{ matrix.packages.name }}
          fail_ci_if_error: true
          use_oidc: true
