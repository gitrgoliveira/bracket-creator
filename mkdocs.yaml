site_name: bracket-creator
site_url: https://gitrgoliveira.github.io/bracket-creator/

# Repository
repo_name: gitrgoliveira/bracket-creator
repo_url: https://github.com/gitrgoliveira/bracket-creator

extra_css:
  - assets/stylesheets/extra.css

# Mermaid: load the library explicitly plus an init that re-runs on Material's
# instant-navigation page swaps (see assets/javascripts/mermaid-init.js).
extra_javascript:
  # Pinned to the current latest (11.16.0) for reproducible builds; bump the
  # version here to upgrade (check https://www.npmjs.com/package/mermaid).
  - https://cdn.jsdelivr.net/npm/mermaid@11.16.0/dist/mermaid.min.js
  - assets/javascripts/mermaid-init.js

markdown_extensions:
  # attr_list + md_in_html power the home-page grid cards (the `markdown`
  # attribute on a <div class="grid cards"> block, styled in extra.css).
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      # Register the `mermaid` fence so Material renders ```mermaid blocks as
      # diagrams (built-in Mermaid support) instead of plain code blocks.
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  # Defining a plugins block suppresses the implicit default, so `search`
  # must be listed explicitly to keep the search box working.
  - search
  # Forward the pre-restructure user-guide URLs (published for a long time,
  # so linked externally and indexed by search engines) to their new homes.
  - redirects:
      redirect_maps:
        'user-guide/getting-started.md': 'user-guide/install/install.md'
        'user-guide/hosting.md': 'user-guide/install/hosting.md'
        'user-guide/input-format.md': 'user-guide/organisers/input-format.md'
        'user-guide/mobile-app.md': 'user-guide/organisers/run-tournament.md'
        'user-guide/naginata.md': 'user-guide/organisers/naginata.md'
        'user-guide/web-ui.md': 'user-guide/organisers/web-ui.md'

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.indexes
    # navigation.sections is intentionally OFF: with it, every group renders
    # permanently expanded (~30 sidebar rows, overflowing the viewport).
    # Without it, groups are collapsible and only the active path expands.
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    # One-tap copy on every code block: the docs are CLI-heavy (install +
    # command pages), so copy-paste of shell commands is the primary action.
    - content.code.copy
  favicon: assets/images/favicon.ico
  # Brand crest (kendo men + shinai + sword), white silhouette on transparent so
  # it reads on the navy header in both schemes. Derived from logo/bracket-creator.v2.jpeg.
  logo: assets/images/logo-crest-light.png
  font:
    # Atkinson Hyperlegible (Braille Institute) maximizes glyph separation
    # (l/I/1, O/0/Q); chosen for legibility in bright/noisy halls per
    # PRODUCT.md. JetBrains Mono keeps CLI examples crisp.
    text: Atkinson Hyperlegible
    code: JetBrains Mono
  # Colors are driven entirely by assets/stylesheets/extra.css (the
  # --md-primary-fg-color / --md-accent-fg-color tokens, scoped per scheme).
  # Material's `primary`/`accent` only accept named palettes (e.g. `indigo`),
  # not hex, so hex values here are silently ignored; they are intentionally
  # omitted so the CSS is the single source of truth.
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-3
        name: Switch to light mode

nav:
  - Home: index.md
  - User guide:
      - Start here:
          - Choosing your setup: user-guide/start-here/choosing-your-setup.md
          - Your first tournament: user-guide/start-here/first-tournament.md
      - Install and deployment:
          - Install: user-guide/install/install.md
          - Host the tournament app: user-guide/install/hosting.md
      - For organisers:
          - Input format: user-guide/organisers/input-format.md
          - Run a tournament on the day: user-guide/organisers/run-tournament.md
          - Operating modes and access control: user-guide/organisers/operating-modes.md
          - Tournament formats: user-guide/organisers/formats.md
          - Team tournaments: user-guide/organisers/team-tournaments.md
          - Naginata competitions: user-guide/organisers/naginata.md
      - For court operators:
          - Score a match: user-guide/court-operators/scoring-a-match.md
          - Record match decisions: user-guide/court-operators/recording-decisions.md
      - For competitors:
          - Self-run tournaments: user-guide/competitors/self-run.md
      - For spectators:
          - Follow the tournament: user-guide/spectators/following.md
      - Commands:
          - create-pools: user-guide/commands/create-pools.md
          - create-playoffs: user-guide/commands/create-playoffs.md
          - mobile-app: user-guide/commands/mobile-app.md
          - print: user-guide/commands/print.md
          - hash-password: user-guide/commands/hash-password.md
          - version: user-guide/commands/version.md
      - Legacy Web UI:
          - Overview: user-guide/organisers/web-ui.md
          - serve command: user-guide/commands/serve.md
  - Developer guide:
      - Code of conduct: dev-guide/code_of_conduct.md
      - Contributing: dev-guide/contributing.md
      - Architecture:
          - Software: architecture/software-architecture.md
          - Network: architecture/network-architecture.md
          - Infrastructure: architecture/infrastructure-architecture.md
