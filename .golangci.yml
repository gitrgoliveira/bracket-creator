version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  skip-dirs:
    - web-mobile/node_modules
    - web/node_modules
    - node_modules
    - vendor



linters:
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gosec
    - unconvert
  settings:
    revive:
      rules:
        - name: unused-parameter
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - web-mobile/node_modules
    - web/node_modules
    - node_modules

output:
  formats:
    text:
      path: stdout
      print-issued-lines: true
      print-linter-name: true
      colors: true