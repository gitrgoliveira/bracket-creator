openapi: 3.1.0
info:
  title: bracket-creator API
  description: |
    Web API for generating Kendo tournament brackets.

    This spec covers two servers:
    - **Bracket Generator** (`serve` command): Stateless, form-based bracket generation.
    - **Mobile/Admin API** (`mobile-app` command): Stateful REST API for live tournament management.

    The Mobile/Admin API routes under `/api/` (excluding `/api/viewer/`) require the
    `X-Tournament-Password` header for authentication, with several public exceptions:

    - **`GET /api/events`** — SSE stream; always public so viewers and spectator screens
      can receive live updates without an admin credential.
    - **`GET /api/auth-config`** — always public; carries no secret material.
    - **`POST /api/tournament/reset`** — public in file mode (the recovery path for a
      forgotten password); returns `404` in locked mode (`--lock-password`).
    - **`GET /api/schedule/estimate`** — stateless schedule calculator; always public.
    - **`GET /api/competitions/{id}/competitor-status`** — public read; the `POST` write is protected.
    - **`GET /api/competitions/{id}/teams/{tid}/lineups/{round}`** — public read; `PUT`/`DELETE` are protected.
    - **`GET /api/competitions/{id}/swiss/standings`** — public read; always public.
    - **`GET /api/tournament/announcement`** — public read; returns the currently active admin broadcast announcement (204 when none/expired).
  version: 2.1.0

servers:
  - url: http://localhost:8080
    description: Bracket Generator (serve command)
  - url: http://localhost:8081
    description: Mobile/Admin API (mobile-app command)

tags:
  - name: bracket-generator
    description: Stateless bracket/pool Excel generation (serve command)
  - name: tournament
    description: |
      Tournament-level configuration (mobile-app command).
      Most endpoints require `X-Tournament-Password`. Exceptions: `GET /api/auth-config`
      and `POST /api/tournament/reset` (see info description for the full public-exception list).
  - name: competitions
    description: Competition management (mobile-app command, requires auth)
  - name: participants
    description: Participant and seed management (mobile-app command, requires auth)
  - name: matches
    description: Match scoring and overrides (mobile-app command, requires auth)
  - name: viewer
    description: Public read-only endpoints (mobile-app command, no auth required)
  - name: system
    description: Health and status endpoints

paths:

  # ── Bracket Generator ──────────────────────────────────────────────────────

  /api/parse-participants:
    post:
      tags: [bracket-generator]
      summary: Parse and validate participants
      description: Parses a CSV list of participants and returns a structured list. Detects duplicates.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [playerList]
              properties:
                playerList:
                  type: string
                  description: Newline-separated CSV of players.
                withZekkenName:
                  type: boolean
                  description: Whether the CSV uses the "Name, ZekkenName, Dojo" format.
      responses:
        '200':
          description: Successfully parsed participants.
          content:
            application/json:
              schema:
                type: object
                properties:
                  participants:
                    type: array
                    items:
                      $ref: '#/components/schemas/Participant'
        '400':
          $ref: '#/components/responses/BadRequest'

  /create:
    post:
      tags: [bracket-generator]
      summary: Generate tournament bracket Excel file
      description: Generates an Excel spreadsheet containing the tournament bracket.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [playerList, tournamentType]
              properties:
                playerList:
                  type: string
                tournamentType:
                  type: string
                  enum: [pools, playoffs]
                singleTree:
                  type: string
                  enum: ["on", "off"]
                withZekkenName:
                  type: string
                  enum: ["on", "off"]
                determined:
                  type: string
                  enum: ["on", "off"]
                mirror:
                  type: string
                  enum: ["on", "off"]
                titlePrefix:
                  type: string
                numberPrefix:
                  type: string
                teamMatches:
                  type: integer
                  default: 0
                winnersPerPool:
                  type: integer
                  default: 2
                playersPerPool:
                  type: integer
                  default: 3
                roundRobin:
                  type: string
                  enum: ["on", "off"]
                poolSizeMode:
                  type: string
                  enum: [max, exact]
                courts:
                  type: integer
                  default: 2
                seeds:
                  type: string
                  description: JSON-encoded array of SeedAssignment objects.
                downloadToken:
                  type: string
                  description: Token for polling /api/download-status.
      responses:
        '200':
          description: Excel file containing the generated bracket.
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/download-status:
    get:
      tags: [bracket-generator]
      summary: Check download status
      description: Poll to check if a file generation triggered via /create is complete.
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Download readiness status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean

  /api/status:
    get:
      tags: [system]
      summary: Application status
      description: Returns version and build details (bracket-generator serve command).
      responses:
        '200':
          description: Status information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppStatus'

  # ── System ─────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [system]
      summary: Health check
      description: Returns 200 OK when the mobile-app server is running.
      responses:
        '200':
          description: Server is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/events:
    get:
      tags: [system]
      summary: Server-Sent Events stream
      description: |
        Subscribe to real-time tournament updates via SSE.

        Event types (canonical set defined in `internal/mobileapp/hub.go`):
        - `match_updated` — a match's score/court/scheduledAt changed.
          `data: { competitionId, matchId, ... }`.
        - `competition_started` — a competition transitioned out of `setup`.
          `data: { competitionId }`.
        - `competition_completed` — a competition transitioned to `completed`
          (either via POST /complete or via the auto-complete check after the
          last pool match scored). `data: { competitionId }`.
        - `tournament_updated` — tournament-level config change (a competition
          was created/updated/deleted, participants updated, etc.).
          `data: null` — clients should refresh full state.
        - `schedule_updated` — a competition's schedule was saved.
        - `password_reset` — the admin password was changed. Emitted
          from three sources (file mode only; never emitted in locked mode):
          1. `POST /api/tournament/reset` — the public recovery endpoint.
             Payload includes `originatorId` so the submitting tab can
             suppress its own broadcast: `data: { originatorId: "<opaque>" }`.
          2. `PUT /api/tournament` — when an admin changes the password
             via a tournament edit. Payload is `data: {}` (no originatorId;
             all sessions including the editing tab should re-authenticate).
          3. `POST /api/tournament` — when an existing tournament is
             overwritten with a different password. Payload is `data: {}`.
          Consumers must treat `originatorId` as optional and handle both
          payload shapes. Non-originating sessions should clear their
          cached credential from `localStorage` and re-show the
          authentication modal.
      responses:
        '200':
          description: SSE stream of tournament events.
          content:
            text/event-stream:
              schema:
                type: string

  # ── Tournament (Admin, requires auth) ──────────────────────────────────────

  /api/tournament:
    get:
      tags: [tournament]
      summary: Get tournament configuration
      description: |
        Returns the tournament record. In **locked mode** (`--lock-password` startup flag) the
        `password` field is stripped from the response — auth comes from the env-var bcrypt hash
        and the on-disk value is irrelevant. The same redaction applies to the PUT and POST
        responses below. Use `GET /api/auth-config` to discover which mode the server is in
        without authenticating.
      security:
        - TournamentPassword: []
      responses:
        '200':
          description: Tournament configuration. `password` is empty in locked mode.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tournament'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [tournament]
      summary: Create tournament configuration
      description: |
        Creates a new tournament.

        **File mode (default)**: allowed without the
        `X-Tournament-Password` header when no tournament has been
        configured yet (bootstrap). `password` must be non-empty
        (`tournament password is required`) — an empty Password on
        disk would let AuthMiddleware's `password != t.Password`
        check vacuously pass for any client sending an empty header.
        Once a tournament with a password exists, auth is required.

        **Locked mode (`--lock-password`)**: there is NO bootstrap
        exception — the bcrypt env-var hash is the credential from
        the very first request. The `password` field in the request
        body is
        accepted but **discarded** server-side — authentication uses the bcrypt hash from
        `TOURNAMENT_PASSWORD_HASH` env var, not the stored value. **Bootstrap requires
        `X-Tournament-Password` to match the env-var hash, even on a never-initialized
        deployment** — anonymous bootstrap would let any network-reachable client race-claim
        the initial tournament record. The SPA's CreateTournament form detects locked mode
        via `GET /api/auth-config` and sends the env-var password as the header on the
        bootstrap POST. The response body's `password` field is empty.

        `name` is trimmed and must be non-empty after trim (`tournament name is required`).
        `venue` and `date` are also trimmed but may be empty.
      security:
        - TournamentPassword: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tournament'
      responses:
        '201':
          description: Tournament created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tournament'
        '400':
          $ref: '#/components/responses/BadRequest'
    put:
      tags: [tournament]
      summary: Update tournament configuration
      description: |
        Updates tournament config.

        **Authentication**:
          - File mode: also allowed without auth during bootstrap.
            `AuthMiddleware` skips the password check only when
            `tournament.md` is missing OR when the on-disk record is
            the literal default placeholder (`Name == "New Tournament"
            && Password == ""`). A real-named record with an empty
            password is FAIL-CLOSED — rejected with 403 (`tournament
            misconfigured: password is not set`) before this handler
            runs; operator can use `POST /api/tournament/reset` or
            repair `tournament.md` out-of-band to recover. The
            empty-stored guard is disabled in locked mode (the
            on-disk password is irrelevant).
          - Locked mode: `X-Tournament-Password` is REQUIRED — there
            is no bootstrap exception. The middleware verifies the
            header against the bcrypt hash from
            `TOURNAMENT_PASSWORD_HASH`. See
            `internal/mobileapp/middleware.go` AuthMiddleware for the
            exact branches.

        Validation matches POST for `name` (rejected if empty after trim).

        **File mode — Password preserve semantics**: when the request
        body omits `password` or sends an empty string, the server
        preserves the currently-stored password. This matches the
        admin UI's `password: pass || undefined` pattern ("leave blank
        to keep current"). If after the preserve step the password is
        STILL empty (operator manually edited `tournament.md`, or a
        fresh PUT against a never-initialized tournament), the
        request is rejected with 400 (`tournament password is
        required`). Successful rotations broadcast
        `EventPasswordReset` over SSE so other logged-in admins clear
        their stale localStorage credential and re-prompt; name-only
        edits do not.

        **Locked mode — password rotation is disabled**: PUTs that
        carry a non-empty `password` field are **rejected with 400**
        (`password rotation is disabled in locked mode; restart with
        a new TOURNAMENT_PASSWORD_HASH`). The auth credential lives
        in the env-var hash and is rotated by restarting the server
        with a new value, not via the API. Empty/omitted `password`
        is accepted so admins can edit `name`/`venue`/`courts`/etc.;
        the on-disk Password is preserved on disk regardless and
        zeroed on the response so admin UIs don't surface a stale
        credential.
      security:
        - TournamentPassword: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tournament'
      responses:
        '200':
          description: Tournament updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tournament'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/tournament/reset:
    post:
      tags: [tournament]
      summary: Reset the admin password (file mode only)
      description: |
        Replaces the stored admin password with the supplied value. Unauthenticated by
        design — this is the documented recovery path for a forgotten admin password
        on local / private deployments.

        The endpoint is disabled in **locked mode** (`--lock-password` CLI flag, with
        `TOURNAMENT_PASSWORD_HASH` env var supplying a bcrypt hash). In locked mode the
        response is `404 reset disabled`. Clients can pre-check via
        `GET /api/auth-config`.

        For production deployments accessible over the network, operators are advised to
        run with `--lock-password` so password rotation requires control of the server's
        environment rather than network reachability.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  minLength: 1
                  maxLength: 256
                  description: New admin password. Replaces the stored value. Matches the cap on `Tournament.password` (`components/schemas/Tournament`).
                originatorId:
                  type: string
                  maxLength: 128
                  description: |
                    Optional opaque per-tab/client identifier. When supplied, the server echoes it
                    on the `password_reset` SSE event payload so the originating client can ignore
                    its own broadcast and avoid clobbering the just-written credential. The server
                    treats this value as opaque (length-capped, never persisted, never logged).
      responses:
        '204':
          description: Password rotated. All existing admin sessions become invalid on the next request.
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: |
            Cross-origin POST rejected. The handler requires both the Origin scheme and
            host:port to match the server's effective scheme (http vs https) and `Host`
            header (RFC 6454 §3.2). Rejected cases: scheme mismatch (e.g. HTTPS Origin
            to a plain-HTTP server), host or port mismatch, malformed Origin URL, and
            `Origin: null` (sandboxed iframes, file://, data: URLs).
        '404':
          description: Reset disabled (locked mode active).
        '409':
          description: Tournament not initialized; bootstrap via `POST /api/tournament` first.

  /api/auth-config:
    get:
      tags: [tournament]
      summary: Public auth-mode metadata
      description: |
        Reports the active authentication mode. Used by the SPA on first load to decide
        whether to surface the password-reset UI. Public (no auth header required) —
        the response carries no secret material, only the operator-visible toggle bits.

        `mode` is one of:
          * `file` — admin password lives in `tournament.md` (plaintext). Default.
          * `locked` — admin password is a bcrypt hash read from `TOURNAMENT_PASSWORD_HASH`.
            `POST /api/tournament/reset` returns 404 in this mode; the SPA `/reset`
            page is still served but renders an operator-disabled message.
      responses:
        '200':
          description: Auth-mode metadata.
          content:
            application/json:
              schema:
                type: object
                required: [mode, resetEnabled]
                properties:
                  mode:
                    type: string
                    enum: [file, locked]
                  resetEnabled:
                    type: boolean
                    description: Whether POST /api/tournament/reset is honored.
                  elevatedRequired:
                    type: boolean
                    description: |
                      Whether the destructive-ops password gate is active. File mode:
                      true once an admin password has been set. Locked mode: always true.
                      When false, destructive endpoints require only the main password.
                  elevatedConfigured:
                    type: boolean
                    description: |
                      Whether a destructive-ops credential exists. File mode: an admin
                      password is set. Locked mode: TOURNAMENT_ADMIN_PASSWORD_HASH is a
                      valid bcrypt hash. When required but not configured, gated
                      endpoints return 503.
                  elevatedEditable:
                    type: boolean
                    description: |
                      Whether the destructive-ops password can be set via
                      PUT /api/auth/admin-password. True in file mode; false in locked
                      mode (the credential is the TOURNAMENT_ADMIN_PASSWORD_HASH env var).

  /api/auth/admin-password:
    put:
      tags: [tournament]
      summary: Set or rotate the destructive-ops (elevated) password
      description: |
        Sets or rotates the file-mode destructive-ops password (spec 004 /
        mp-e21). Gated by the MAIN password (`X-Tournament-Password`) via the
        admin middleware.

          * First-time set (no admin password yet) — trust-on-first-use: the
            main password authorizes it; `currentPassword` is ignored.
          * Rotation (admin password already set) — `currentPassword` must
            equal the stored value, else 401. This prevents a main-password
            holder from silently re-setting the elevated credential.

        Locked mode returns 404 — the credential is the
        `TOURNAMENT_ADMIN_PASSWORD_HASH` env var and is not settable via the
        API. The response never echoes any password (write-only).
      security:
        - TournamentPassword: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                newPassword:
                  type: string
                  maxLength: 256
                  description: The destructive-ops password to store (non-empty).
                currentPassword:
                  type: string
                  maxLength: 256
                  description: Required only when an admin password is already set (rotation).
      responses:
        '200':
          description: Admin password set or rotated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  elevatedConfigured:
                    type: boolean
                    example: true
        '400':
          description: Empty newPassword or over-length field.
        '401':
          description: Wrong currentPassword on rotation (or missing/invalid main password).
        '404':
          description: Locked mode — not settable via the API.
        '409':
          description: No tournament configured yet.

  /api/tournament/import:
    post:
      tags: [tournament]
      summary: Import tournament configuration
      description: |
        Imports a tournament structure from a set of files (manifest.yaml, participants.csv, etc.)
        via a multipart form upload. The server accepts files under any field name(s).
        One of the uploaded files must be named `manifest.yaml` (or `.yml`); it declares
        which competitions to create and which participant/seed CSV files to associate with each.

        Also requires `X-Admin-Password` when the destructive-ops gate is active
        (see the AdminPassword security scheme); returns 503 when locked mode is
        active but `TOURNAMENT_ADMIN_PASSWORD_HASH` is unset.
      security:
        - TournamentPassword: []
          AdminPassword: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              description: >
                Any number of file fields. The field names are ignored — all uploaded files are
                indexed by filename. Include `manifest.yaml` plus any referenced CSV files.
              additionalProperties:
                type: string
                format: binary
      responses:
        '200':
          description: |
            Import result. Each manifest entry produces one result row;
            partial success is allowed (one row's `error` doesn't abort
            the others). `name` is the trimmed value (matches what's
            saved to disk; the manifest's raw padded value is normalized
            before save and before this response is constructed).
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id: {type: string}
                        name:
                          type: string
                          description: Trimmed competition name as persisted.
                        participantCount: {type: integer}
                        seedCount: {type: integer}
                        error:
                          type: string
                          description: |
                            Per-row error if the import couldn't proceed.
                            Common values: `missing id`, `competition name is required`,
                            `competition ID contains invalid characters ...`,
                            `competition ID "..." already exists`,
                            `save competition: ...`,
                            `parse participants: ...`. Empty when the row
                            imported successfully.

  # ── Announcements ──────────────────────────────────────────────────────────

  /api/tournament/announcement:
    get:
      tags: [tournament]
      summary: Get active announcement
      description: |
        Returns the currently active admin broadcast announcement.
        Returns `204 No Content` when there is no active announcement or the
        last one has already expired. No authentication required — viewer screens
        poll this endpoint on SSE connect to catch announcements they may have
        missed before subscribing.
      responses:
        '200':
          description: Active announcement.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Announcement'
        '204':
          description: No active announcement (none set, or the last one has expired).

  /api/tournament/announce:
    post:
      tags: [tournament]
      summary: Broadcast announcement to all viewers
      description: |
        Sends a transient text announcement to all connected viewer screens via SSE.
        The announcement is stored in-memory only (not persisted to disk); a server
        restart clears it. Late-connecting viewers can retrieve the active announcement
        via `GET /api/tournament/announcement`.

        **Validation:**
        - `message` must be non-empty after trimming whitespace.
        - `message` may not exceed 200 characters (Unicode code-point count).
        - `durationMinutes` must be one of `5`, `10`, `15`, or `30`.
      security:
        - TournamentPassword: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message, durationMinutes]
              properties:
                message:
                  type: string
                  description: Announcement text (max 200 chars after trim).
                  example: "Lunch break for 30 minutes"
                durationMinutes:
                  type: integer
                  enum: [5, 10, 15, 30]
                  description: How long (minutes) the announcement banner stays visible.
                  example: 30
      responses:
        '200':
          description: Announcement sent; returns the stored record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Announcement'
        '400':
          description: Validation failure (empty/too-long message or invalid duration).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid X-Tournament-Password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Competitions (Admin, requires auth) ────────────────────────────────────

  /api/competitions:
    get:
      tags: [competitions]
      summary: List competitions
      description: Returns an empty array `[]` when no competitions exist (never `null`).
      security:
        - TournamentPassword: []
      responses:
        '200':
          description: Array of competitions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Competition'
    post:
      tags: [competitions]
      summary: Create competition
      description: |
        Creates a new competition. The `id` field is optional — when omitted the server
        derives a URL-friendly slug from `name` (lowercase, spaces to hyphens, max 64 chars).

        Validation (returns 400 with explanatory message):
        - `name` is trimmed and must be non-empty (`competition name is required`).
        - `name` must be unique (case-insensitive) across competitions
          (`competition name "X" already exists`).
        - When `id` is omitted AND `name` slugs to empty (no alphanumerics)
          → 400 (`competition ID is required (could not derive one from name)`).
        - Provided `id` must match the path-parameter pattern (see CompetitionId).

        String fields are trimmed server-side: `name`, `numberPrefix`, `kind`,
        `format`, `poolSizeMode`, `startTime`, `date`.
      security:
        - TournamentPassword: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Competition'
      responses:
        '201':
          description: Competition created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competition'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/competitions/{id}:
    parameters:
      - $ref: '#/components/parameters/CompetitionId'
    get:
      tags: [competitions]
      summary: Get competition
      security:
        - TournamentPassword: []
      responses:
        '200':
          description: Competition details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competition'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [competitions]
      summary: Update competition (settings OR roster, mutually exclusive)
      description: |
        Behaviour depends on whether the request body carries the
        `players` field:

        **Settings-update (body OMITS `players`):**
        The server applies these fields from the body onto the
        on-disk record: `name`, `date`, `startTime`, `poolSize`,
        `poolWinners`, `poolSizeMode`, `courts`, `roundRobin`,
        `withZekkenName`, `teamSize`, `numberPrefix`, `format`,
        `kind`, `mirror`. String fields are trimmed server-side.
        Rejected with 400 if `name` is empty after trim, if `name`
        collides (case-insensitive) with another competition's name,
        or if `date` is non-empty and not in canonical `DD-MM-YYYY`
        format.

        **Roster-save (body INCLUDES `players`, even an empty array):**
        The server writes `participants.csv` (and clears or extracts
        `seeds.csv` from each player's `seed` field) and IGNORES all
        settings fields in the body. This is how the admin
        participants page saves the roster — its body shape is
        `{ ...c, players: np }` where `c` is a possibly-stale
        frontend snapshot of the competition. Treating settings
        fields as authoritative in this case would silently revert
        any concurrent settings change. To update settings AND the
        roster in one logical operation, issue two PUTs (settings
        first, then roster). Players with `seed: 0` produce no seed
        entry; sending `players: []` clears the roster.

        Returns 404 when the competition does not exist (this endpoint
        never creates).

        Server-managed fields — `status`, `hasParticipantIDs` — are
        IGNORED in the body. Use the dedicated transition endpoints
        (`/start`, `/complete`, `/invalidate`) to change status.

        **Elevated password (spec 004 / mp-e21):** the ROSTER-save path
        (non-null `players`) additionally requires `X-Admin-Password`
        when the destructive-ops gate is active — it rewrites
        `participants.csv`, the same protected operation as the dedicated
        participant endpoints. Returns 503 if locked mode is active without
        `TOURNAMENT_ADMIN_PASSWORD_HASH`. The SETTINGS-only path
        (`players` omitted) is NOT gated and needs only the main password.
        The gate runs inside the handler (after body binding), so the
        security requirement below is conditional on the body shape.
      security:
        - TournamentPassword: []
          AdminPassword: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Competition'
      responses:
        '200':
          description: Competition updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [competitions]
      summary: Delete competition
      description: |
        Idempotent — returns 204 even when the competition does not exist.
        Allowed in any non-in-progress state (`setup`, `completed`,
        `invalid`, or unset). In-progress competitions (`pools`/`playoffs`)
        must first be invalidated via `POST /api/competitions/{id}/invalidate`.

        Also requires `X-Admin-Password` when the destructive-ops gate is active
        (see the AdminPassword security scheme); 503 if locked mode is active
        without `TOURNAMENT_ADMIN_PASSWORD_HASH`.
      security:
        - TournamentPassword: []
          AdminPassword: []
      responses:
        '204':
          description: Competition deleted (or did not exist).
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Competition is in progress and must be invalidated first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/invalidate:
    post:
      tags: [competitions]
      summary: Mark in-progress competition as invalid
      description: |
        Transitions a competition from `pools` or `playoffs` to `invalid`,
        which is the prerequisite for deletion of an already-started
        competition. Returns 400 if the competition is not in an in-progress
        state.

        Also requires `X-Admin-Password` when the destructive-ops gate is active
        (see the AdminPassword security scheme); 503 if locked mode is active
        without `TOURNAMENT_ADMIN_PASSWORD_HASH`.
      security:
        - TournamentPassword: []
          AdminPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '200':
          description: Competition marked as invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/generate-draw:
    post:
      tags: [competitions]
      summary: Generate draw (preview)
      description: |
        Generates pools/bracket/Swiss-r1 from the saved participant list and seeds and
        transitions the competition to `draw-ready` status without starting it.
        The operator can inspect the draw, discard it, and regenerate before calling
        `/start`. Participant edits are blocked while a draw is pending.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '200':
          description: Draw generated; competition is now in `draw-ready` status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/draw:
    delete:
      tags: [competitions]
      summary: Discard draw
      description: |
        Discards the generated draw for a `draw-ready` competition, deletes draw
        artifacts (pools.csv, pool-matches.csv, bracket.json), and resets the
        competition to `setup`. Returns 400 if the competition is not in `draw-ready`
        state.

        Also requires `X-Admin-Password` when the destructive-ops gate is active
        (see the AdminPassword security scheme); 503 if locked mode is active
        without `TOURNAMENT_ADMIN_PASSWORD_HASH`.
      security:
        - TournamentPassword: []
          AdminPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '204':
          description: Draw discarded; competition reset to setup.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/start:
    post:
      tags: [competitions]
      summary: Start competition
      description: |
        Starts the competition. When in `draw-ready` status the existing draw is reused
        and the competition transitions directly to `pools` or `playoffs`. When in
        `setup` status the draw is generated first then the competition transitions
        (backward-compatible one-click path).
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '200':
          description: Competition started.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/complete:
    post:
      tags: [competitions]
      summary: Complete competition
      description: |
        Transitions a competition from `pools` or `playoffs` status to `completed`.
        Returns 400 if the competition is not in a completable state.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '200':
          description: Competition marked as completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/playoffs:
    post:
      tags: [competitions]
      summary: Create linked playoff competition
      description: |
        Creates a new `playoffs`-format competition linked to this mixed
        (Pools + Knockout) competition. The server:
        - Derives a name (`<source name> - Playoffs`) and ID.
        - Records a `sourceCompID` link back to this competition.

        The playoff starts with an EMPTY roster. Its participants are resolved
        from the source competition's pool winners when the playoff is started
        (`POST /start`) — the source pools must be final by then. No placeholder
        participants are created.

        Returns 400 if the source competition is not in `mixed` format.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '201':
          description: Playoff competition created and linked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/export:
    get:
      tags: [competitions]
      summary: Export competition as Excel
      description: Downloads an .xlsx file with the current bracket/pools state.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '200':
          description: Excel file.
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/overrides:
    delete:
      tags: [competitions]
      summary: Reset all overrides
      description: |
        Clears all manual rank and bracket-winner overrides for this competition.

        Also requires `X-Admin-Password` when the destructive-ops gate is active
        (see the AdminPassword security scheme); 503 if locked mode is active
        without `TOURNAMENT_ADMIN_PASSWORD_HASH`.
      security:
        - TournamentPassword: []
          AdminPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '204':
          description: Overrides reset.


  /api/competitions/{id}/schedule:
    put:
      tags: [competitions]
      summary: Save schedule
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/ScheduleEntry'
      responses:
        '200':
          description: Schedule saved.

  /api/competitions/{id}/pools/{poolId}/override-rank:
    put:
      tags: [competitions]
      summary: Override pool rank
      description: Manually set a player's rank within a pool, overriding the computed value.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - in: path
          name: poolId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [playerName, rank]
              properties:
                playerName:
                  type: string
                  maxLength: 100
                rank:
                  type: integer
      responses:
        '200':
          description: Rank override saved.

  # ── Participants & Seeds (Admin, requires auth) ────────────────────────────

  /api/competitions/{id}/participants:
    get:
      tags: [participants]
      summary: Get participants
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '200':
          description: List of players.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Player'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [participants]
      summary: Set participants (JSON)
      description: |
        Replaces the current participants list for the competition with the provided JSON.

        Also requires `X-Admin-Password` when the destructive-ops gate is active
        (see the AdminPassword security scheme); 503 if locked mode is active
        without `TOURNAMENT_ADMIN_PASSWORD_HASH`.
      security:
        - TournamentPassword: []
          AdminPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                players:
                  type: array
                  items:
                    $ref: '#/components/schemas/Participant'
      responses:
        '200':
          description: Participants successfully updated.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Player'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/participants/{pid}:
    put:
      tags: [participants]
      summary: Update a participant
      description: |
        Updates an individual participant's name, dojo, displayName, danGrade, metadata, and tag.

        Allowed in `setup` state (no draw yet) and `draw-ready` state (draw generated
        but not started). In draw-ready state the change **cascades** through draw
        artifacts: `pools.csv`, `bracket.json`, and `pool-matches.csv` are updated
        in place — the draw structure (pool assignments, elimination bracket) is
        preserved. Seeds are renamed automatically by the participant update.

        Returns the updated player. When the cascade detects dojo conflicts,
        a `warnings` array is included alongside the player fields.

        Also requires `X-Admin-Password` when the destructive-ops gate is active.
      security:
        - TournamentPassword: []
          AdminPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - in: path
          name: pid
          required: true
          schema:
            type: string
          description: Participant UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, dojo]
              properties:
                name:
                  type: string
                  description: Participant's full name (trimmed; must not be blank).
                dojo:
                  type: string
                  description: Participant's dojo (trimmed; must not be blank).
                displayName:
                  type: string
                  description: Bib/zekken display name (only persisted for zekken-enabled competitions).
                danGrade:
                  type: string
                  description: Dan grade string (e.g. "3 Dan"). Stored in Metadata[0] when Metadata is absent.
                metadata:
                  type: array
                  items:
                    type: string
                tag:
                  type: string
                  description: Provenance tag (e.g. "manual", "registered").
      responses:
        '200':
          description: |
            Participant updated. When the competition is in `draw-ready` state and
            the cascade detects dojo conflicts, a `warnings` array is included in
            the response alongside the standard player fields. If the draw cascade
            itself fails (e.g. an I/O error after pools were already updated), the
            participant update is still persisted and the response includes a
            `cascadeError` string; any warnings collected before the failure are
            also included.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Player'
                  - type: object
                    properties:
                      warnings:
                        type: array
                        items:
                          type: string
                        description: |
                          Non-fatal advisory messages from the draw cascade (e.g. dojo
                          conflict). Present only when at least one warning was
                          generated; absent in setup state.
                      cascadeError:
                        type: string
                        description: |
                          Present when the participant update succeeded but the draw
                          cascade failed (e.g. I/O error updating bracket artifacts).
                          The operator should review and may need to re-generate the draw.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/seeds:
    get:
      tags: [participants]
      summary: Get seed assignments
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '200':
          description: Current seed assignments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SeedAssignment'
    put:
      tags: [participants]
      summary: Save seed assignments
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/SeedAssignment'
      responses:
        '200':
          description: Seeds saved.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SeedAssignment'

  # ── Matches (Admin, requires auth) ─────────────────────────────────────────

  /api/competitions/{id}/matches/{mid}/score:
    put:
      tags: [matches]
      summary: Record match result
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchResult'
      responses:
        '200':
          description: Result recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResult'

  /api/competitions/{id}/matches/{mid}/court:
    put:
      tags: [matches]
      summary: Assign match to court
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [court]
              properties:
                court:
                  type: string
                  maxLength: 32
                  example: A
      responses:
        '200':
          description: Court updated.

  /api/competitions/{id}/matches/{mid}/override-winner:
    put:
      tags: [matches]
      summary: Override bracket winner
      description: Manually set the winner of a bracket match, bypassing score calculation.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [winnerName]
              properties:
                winnerName:
                  type: string
                  maxLength: 100
      responses:
        '200':
          description: Winner overridden.

  /api/competitions/{id}/matches/{mid}/time:
    put:
      tags: [matches]
      summary: Set match scheduled time
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scheduledAt]
              properties:
                scheduledAt:
                  type: string
                  maxLength: 32
                  description: HH:MM scheduled time.
                  example: "14:30"
      responses:
        '200':
          description: Time updated.

  /api/competitions/{id}/matches/bulk-score:
    post:
      tags: [matches]
      summary: Bulk record match results
      description: >
        Records multiple match results in a single request. Processes each entry independently;
        partial success is allowed. Returns a count of successful updates and a list of errors
        for any that failed.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/MatchResult'
      responses:
        '200':
          description: Bulk operation result (may include partial failures).
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded:
                    type: integer
                    description: Number of matches successfully scored.
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        matchId:
                          type: string
                        error:
                          type: string

  /api/competitions/{id}/matches/{mid}/quick-score:
    put:
      tags: [matches]
      summary: Quick-score a team match
      description: >
        Simplified scoring for team matches. Provide the individual win/loss/draw counts
        and the server determines the team winner and synthesises SubResults so that
        standings IV/IL/IT counts are updated correctly. Use the full `/score` endpoint
        when you have per-member ippon data.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sideA, sideB]
              properties:
                sideA:
                  type: string
                  maxLength: 100
                  description: Team A name.
                sideB:
                  type: string
                  maxLength: 100
                  description: Team B name.
                teamAWins:
                  type: integer
                  description: Number of individual bouts won by team A.
                teamBWins:
                  type: integer
                  description: Number of individual bouts won by team B.
                draws:
                  type: integer
                  description: Number of individual bouts that were draws.
      responses:
        '200':
          description: Match result recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResult'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/competitions/{id}/matches/{mid}/decision:
    post:
      tags: [matches]
      summary: Record decision outcome (kiken-voluntary/kiken-injury/fusenpai/fusensho/daihyosen)
      description: >
        Records a non-scored decision for a match. Use this instead of
        `/score` when the outcome is determined by walkover, withdrawal,
        or representative bout rather than ippon scoring.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision, decisionBy]
              properties:
                decision:
                  type: string
                  enum: [kiken, kiken-voluntary, kiken-injury, fusenpai, fusensho, daihyosen]
                decisionBy:
                  type: string
                  enum: [shiro, aka]
                decisionReason:
                  type: string
                  maxLength: 200
                encho:
                  $ref: '#/components/schemas/EnchoMetadata'
      responses:
        '200':
          description: Decision recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Competitor not eligible (ineligible_competitor).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/competitions/{id}/matches/{mid}/daihyosen:
    post:
      tags: [matches]
      summary: Add representative (daihyosen) bout to a tied team match
      description: >
        Adds a daihyosen (representative) bout to break a tie in an
        elimination team match. Rejected if the match is not tied,
        if it is a pool match, or if neither team has sufficient
        eligible competitors.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - $ref: '#/components/parameters/MatchId'
      responses:
        '200':
          description: Daihyosen bout added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResult'
        '400':
          description: Match is not tied (`not_tied`) or is a pool match (`pool_match`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Insufficient eligible competitors (`insufficient_eligibility`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/competitions/{id}/competitor-status:
    parameters:
      - $ref: '#/components/parameters/CompetitionId'
    get:
      tags: [competitions]
      summary: List competitor eligibility statuses
      security: []
      responses:
        '200':
          description: Current competitor statuses.
          content:
            application/json:
              schema:
                type: object
                properties:
                  statuses:
                    type: array
                    items:
                      $ref: '#/components/schemas/CompetitorStatus'
    post:
      tags: [competitions]
      summary: Set a competitor status entry
      security:
        - TournamentPassword: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompetitorStatus'
      responses:
        '200':
          description: Status entry recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompetitorStatus'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/competitions/{id}/competitors/{pid}/reinstate:
    post:
      tags: [competitions]
      summary: Reinstate an injured competitor
      description: >
        Restores eligibility for a competitor who was withdrawn via
        kiken-injury (FIK Art. 30). Only works when the competitor's
        status has `reinstateable: true`. Voluntary kiken (Art. 31)
        and fusenpai are not reinstateable.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - in: path
          name: pid
          required: true
          schema:
            type: string
          description: Player ID of the competitor to reinstate.
      responses:
        '200':
          description: Competitor reinstated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompetitorStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: >
            Competitor is not reinstateable (voluntary kiken or fusenpai)
            or is not currently ineligible.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/competitions/{id}/teams/{tid}/lineups/{round}:
    parameters:
      - $ref: '#/components/parameters/CompetitionId'
      - in: path
        name: tid
        required: true
        schema:
          type: string
        description: Team ID.
      - in: path
        name: round
        required: true
        schema:
          type: integer
        description: Tournament round number.
    get:
      tags: [competitions]
      summary: Get team lineup for round
      security: []
      responses:
        '200':
          description: Team lineup.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamLineup'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [competitions]
      summary: Save team lineup for round
      security:
        - TournamentPassword: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamLineup'
      responses:
        '200':
          description: Lineup saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamLineup'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Lineup is locked and cannot be edited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [competitions]
      summary: Delete team lineup for round
      security:
        - TournamentPassword: []
      responses:
        '204':
          description: Lineup deleted.

  /api/competitions/{id}/swiss/standings:
    parameters:
      - $ref: '#/components/parameters/CompetitionId'
    get:
      tags: [competitions]
      summary: Get Swiss-format cumulative standings
      description: >
        Returns the cumulative standings for a Swiss-format competition,
        ranked by wins then points. Always public (no auth required) — read-only
        viewer data, same policy as pool standings.
      security: []
      responses:
        '200':
          description: Ranked standings list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlayerStanding'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/schedule/estimate:
    get:
      tags: [viewer]
      summary: Estimate schedule duration
      description: >
        Stateless schedule estimator. Computes total wall-clock duration
        and per-court breakdown given match counts, durations, and court
        configuration. No auth required.
      parameters:
        - in: query
          name: matchDuration
          required: true
          schema:
            type: integer
          description: Per-match clock duration in minutes.
        - in: query
          name: multiplier
          required: true
          schema:
            type: number
          description: Clock-to-elapsed multiplier (e.g. 1.6).
        - in: query
          name: numMatches
          required: true
          schema:
            type: integer
        - in: query
          name: courts
          required: true
          schema:
            type: integer
        - in: query
          name: teamSize
          required: false
          schema:
            type: integer
        - in: query
          name: boutsPerTeamMatch
          required: false
          schema:
            type: integer
        - in: query
          name: buffer
          required: false
          schema:
            type: integer
          description: Slowest-court buffer percentage.
        - in: query
          name: ceremony
          required: false
          schema:
            type: integer
          description: Ceremony allowance in minutes.
      responses:
        '200':
          description: Estimated schedule duration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleEstimate'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ── Viewer (Public, no auth) ───────────────────────────────────────────────

  /api/viewer/tournament:
    get:
      tags: [viewer]
      summary: Get public tournament info
      description: Returns tournament details with password field redacted.
      responses:
        '200':
          description: Public tournament info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tournament'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/viewer/competitions:
    get:
      tags: [viewer]
      summary: List competitions with players
      description: Returns all competitions, each with their player list populated.
      responses:
        '200':
          description: List of competitions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Competition'

  /api/viewer/competitions/{id}:
    get:
      tags: [viewer]
      summary: Get full competition state
      description: Returns config, pools, pool matches, standings, bracket, and schedule.
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '200':
          description: Full competition state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompetitionDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/viewer/schedule:
    get:
      tags: [viewer]
      summary: Get combined schedule for all competitions
      responses:
        '200':
          description: Aggregated schedule entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduleEntry'

  /api/viewer/court/{court}/live:
    get:
      tags: [viewer]
      summary: Get current and upcoming matches for a court
      description: Court-live display feed. Returns the in-progress match and a queue of upcoming matches for the given court.
      parameters:
        - in: path
          name: court
          required: true
          schema:
            type: string
          description: Court label (e.g. "A").
      responses:
        '200':
          description: Court live state.
          content:
            application/json:
              schema:
                type: object
                required: [court, current, upcoming]
                properties:
                  court:
                    type: string
                  current:
                    nullable: true
                    allOf:
                      - $ref: '#/components/schemas/MatchResult'
                  upcoming:
                    type: array
                    items:
                      $ref: '#/components/schemas/MatchResult'

components:

  securitySchemes:
    TournamentPassword:
      type: apiKey
      in: header
      name: X-Tournament-Password
      description: |
        Tournament admin password. Required for all `/api/` routes
        except `/api/viewer/`, `/api/events`, the unauthenticated
        recovery endpoints `/api/auth-config` and `/api/tournament/reset`,
        the public read endpoints `GET /api/schedule/estimate`,
        `GET /api/competitions/{id}/competitor-status`,
        `GET /api/competitions/{id}/teams/{tid}/lineups/{round}`,
        `GET /api/competitions/{id}/swiss/standings`, and
        `GET /api/tournament/announcement`,
        and (in file mode only) the bootstrap PUT/POST `/api/tournament`
        while no tournament has been configured yet.

        ### Two authentication modes

        **File mode (default).** The header is compared exact-string
        against the `password` field stored in `tournament.md`
        (no trimming on either side). Set during the initial bootstrap
        via `POST /api/tournament`, rotated via `PUT /api/tournament`
        with a non-empty `password`, or via the public
        `POST /api/tournament/reset` recovery endpoint.

        Bootstrap exception: when no tournament is configured yet,
        `POST/PUT /api/tournament` is allowed without the header so
        the SPA's CreateTournament flow can pick the admin password.

        Defense-in-depth: if the stored tournament password is somehow
        empty (e.g. operator manually edited `tournament.md` to land
        an empty `password:` field), AuthMiddleware returns 403
        (`tournament misconfigured: password is not set`) for ALL
        requests rather than letting the `header != stored` check
        vacuously pass for empty header. Recovery: either edit
        `tournament.md` out-of-band, or use `POST /api/tournament/reset`.

        **Locked mode (`--lock-password` server flag).** The header
        is verified via bcrypt against the hash from the
        `TOURNAMENT_PASSWORD_HASH` environment variable; the on-disk
        `password` field in `tournament.md` is IGNORED for both auth
        and the GET/PUT/POST response shape (the response always
        returns `"password": ""`). The bootstrap exception above
        does NOT apply — `POST /api/tournament` requires
        X-Tournament-Password from the very first request so a
        network-reachable attacker can't race-claim the initial
        tournament record on a fresh deployment. The reset endpoint
        returns 404. Password rotation requires restarting the
        server with a new `TOURNAMENT_PASSWORD_HASH`; `PUT
        /api/tournament` rejects any non-empty `password` field
        with 400.

        The active mode is exposed via the public
        `GET /api/auth-config` endpoint so clients can branch their
        UI without authenticating.

    AdminPassword:
      type: apiKey
      in: header
      name: X-Admin-Password
      description: |
        Elevated (destructive-ops) password — spec 004 / mp-e21. Required
        IN ADDITION to `X-Tournament-Password` on destructive endpoints:
        `DELETE /api/competitions/{id}`, `POST /api/competitions/{id}/invalidate`,
        `DELETE /api/competitions/{id}/draw`, `DELETE /api/competitions/{id}/overrides`,
        `POST /api/competitions/{id}/participants`,
        `PUT /api/competitions/{id}/participants/{pid}`,
        `POST /api/tournament/import`, and
        `PUT /api/competitions/{id}` **when the body carries a non-null
        `players` field** (the roster-save path — settings-only PUTs are not
        gated).

        Gate behavior:
          * File mode — verified exact-string against the write-only
            `admin_password` in `tournament.md`. While unset the gate is
            INACTIVE (the header is not required; the main password alone
            authorizes the action), so existing file deployments are
            unaffected until an admin password is set.
          * Locked mode — verified via bcrypt against
            `TOURNAMENT_ADMIN_PASSWORD_HASH`. The gate is always active
            (fail-closed): if the env var is unset/malformed the gated
            endpoints return 503 "admin password not configured".

        On a missing/incorrect header (when the gate is active and
        configured) the endpoint returns 401. Set or rotate the file-mode
        value via `PUT /api/auth/admin-password`. There is no session — the
        header is required on each gated request.

  parameters:
    CompetitionId:
      in: path
      name: id
      required: true
      schema:
        type: string
        pattern: '^[a-zA-Z0-9][a-zA-Z0-9_-]*$'
        maxLength: 64
      description: |
        Competition slug/ID (e.g. "mens-individual"). Must start with an
        alphanumeric character, contain only alphanumerics / hyphens /
        underscores, and be at most 64 chars. Validated server-side via
        `requireValidCompID`; invalid IDs return 400
        (`competition ID contains invalid characters` / `competition ID too long` /
        `competition ID cannot be empty`). The validation is a path-traversal
        defense: without it, an `id` like `../../../etc/passwd` would resolve
        through `filepath.Clean(filepath.Join(...))` and escape the data
        directory.
    MatchId:
      in: path
      name: mid
      required: true
      schema:
        type: string
      description: Match ID (e.g. "pool-a-0" or "bracket-r1-m0").

  responses:
    BadRequest:
      description: Invalid input.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Action not permitted in current state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:

    Error:
      type: object
      properties:
        error:
          type: string

    Announcement:
      type: object
      description: A transient admin broadcast announcement stored in-memory.
      properties:
        message:
          type: string
          description: Announcement text (max 200 Unicode characters after trim).
          example: "Lunch break for 30 minutes"
        sentAt:
          type: string
          format: date-time
          description: Server timestamp when the announcement was sent (RFC 3339).
        expiresAt:
          type: string
          format: date-time
          description: Timestamp at which the announcement banner auto-dismisses (RFC 3339).
      required: [message, sentAt, expiresAt]

    AppStatus:
      type: object
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
        buildDate:
          type: string
        goVersion:
          type: string
        osArch:
          type: string

    Tournament:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
          description: Tournament name. Trimmed server-side; rejected with 400 if empty after trim or longer than 200 characters.
        date:
          type: string
          maxLength: 10
          description: >
            Event date in DD-MM-YYYY format. Trimmed server-side; rejected
            with 400 if non-empty and not a syntactically valid day in
            that format (Feb 31 etc. → 400) OR if the year falls outside
            1900–2100. The year-range matches the frontend validator
            (web-mobile/js/admin_helpers.jsx MIN_YEAR/MAX_YEAR) so a
            value the API accepts is also one the admin UI can edit. The
            web frontend converts the HTML `<input type="date">` ISO
            output to DMY at the input boundary; direct API clients
            send DMY directly.
        venue:
          type: string
          maxLength: 200
          description: Venue name. Trimmed server-side.
        courts:
          type: array
          items:
            type: string
          description: >
            Court labels (e.g. ["A", "B"]). Each label is a single
            character; 26-court cap (A–Z). Duplicate labels are rejected
            with 400 — the frontend uses labels as identity keys (per-court
            rendering, schedule `byCourt` bucketing, filter values) and
            duplicates would collapse data structures.
        password:
          type: string
          maxLength: 256
          description: >
            Admin password. Behavior depends on the active auth mode
            (see `GET /api/auth-config`); the shared schema's
            "required" semantics below apply to **file mode** only.

            **File mode** (default — authoritative credential stored
            plaintext in `tournament.md`): required (non-empty) on POST
            /tournament — an empty Password on disk would let
            AuthMiddleware's `password != t.Password` check vacuously
            pass for any client sending an empty
            `X-Tournament-Password` header. On PUT /tournament,
            omitting the field or sending an empty string preserves the
            currently-stored password ("leave blank to keep current");
            sending a non-empty string updates it.

            **Locked mode** (`--lock-password` — non-authoritative;
            bcrypt hash in `TOURNAMENT_PASSWORD_HASH` is the credential):
            POST /tournament accepts but **discards** the body's
            `password` server-side (the on-disk value is preserved for
            an existing record, or set to `""` for a fresh bootstrap);
            non-empty passwords are NOT rejected as a backward-compat
            convenience. PUT /tournament rejects any non-empty
            `password` with 400 — rotation requires restarting the
            server with a new hash. The response body's `password` is
            always empty in locked mode.

            Omitted from viewer responses (`/api/viewer/tournament`).
        openingBlock:
          type: string
          maxLength: 16
          description: Opening ceremony block label/duration.
        lunchBlock:
          type: string
          maxLength: 16
          description: Lunch break block label/duration.
        closingBlock:
          type: string
          maxLength: 16
          description: Closing ceremony block label/duration.
        clockToElapsedMultiplier:
          type: number
          description: Multiplier converting on-clock match minutes to wall-clock elapsed minutes.
        slowestCourtBufferPct:
          type: integer
          description: Buffer percentage applied to the slowest court when estimating overall duration.
        mode:
          type: string
          enum: [officiated, self-run]
          description: >
            Tournament auth posture. Chosen once at creation and **immutable** thereafter
            (mp-7h7) — PUT /tournament rejects a mode change with 400.

            - **officiated** (default): the full admin surface requires `X-Tournament-Password`.
              Constructive actions (scoring, check-in, start) and organiser-setup mutations
              all require the main password.
            - **self-run**: there is no dedicated table operator. Operational actions
              (scoring, check-in, start, complete, swiss round generation) are public — no
              password required. Organiser-setup mutations (tournament/competition config,
              seeds, override edits (set/change result), announcements, schedule, court
              assignment, export) remain behind the main password. Destructive actions
              (delete competition, discard draw, delete/discard overrides, import, participant
              roster mutations) require the separate `X-Admin-Password` elevated credential.

            Always returned in GET/POST/PUT responses regardless of auth mode (unlike
            `password`, which is redacted in locked mode). Defaults to `officiated` when
            omitted on POST (backward-compatible with pre-mp-7h7 tournaments whose
            `tournament.md` lacks the field).
        adminPassword:
          type: string
          writeOnly: true
          maxLength: 256
          description: >
            **Creation-only, file mode, self-run tournaments only.** Sets the elevated
            (destructive-ops) credential atomically in the same POST that creates the
            tournament. Required when `mode` is `"self-run"` in file mode — without it the
            main gate is skipped and destructive routes would be unauthenticated.

            This field is **write-only at the API boundary**: it is never returned in any
            response (`json:"-"` on the server struct) and is ignored by PUT /tournament
            (rotation is done via `PUT /api/auth/admin-password`). In locked mode this
            field is accepted but silently ignored — the `TOURNAMENT_ADMIN_PASSWORD_HASH`
            env var is the authoritative elevated credential.

    Competition:
      type: object
      properties:
        id:
          type: string
          maxLength: 64
          description: >
            Unique competition identifier. Must start with an alphanumeric
            character, contain only alphanumerics / hyphens / underscores,
            and be at most 64 chars (same rule as the `:id` path parameter
            — see CompetitionId).
            Optional on POST — the server derives a slug from `name` when omitted.
        name:
          type: string
          maxLength: 200
          description: >
            Competition name. Trimmed server-side and rejected with 400
            (`competition name is required`) if empty after trim or
            longer than 200 characters.
            Uniqueness check (case-insensitive) on POST/PUT — duplicate
            names return 400 (`competition name "X" already exists`).
        kind:
          type: string
          description: "individual or team"
          enum: [individual, team]
        format:
          type: string
          description: "pools or playoffs"
          enum: [pools, playoffs]
        teamSize:
          type: integer
          description: Number of members per team (0 for individual).
        poolSize:
          type: integer
        poolSizeMode:
          type: string
          enum: [max, exact]
        poolWinners:
          type: integer
        roundRobin:
          type: boolean
        courts:
          type: array
          items:
            type: string
          description: >
            Per-competition court labels (subset of Tournament.courts).
            Each label is a single character; 26-court cap; duplicates
            rejected with 400. Empty array means "use the tournament
            default" — the engine defaults a competition with no Courts
            to 1 court.
        startTime:
          type: string
          maxLength: 8
          description: First-match start time (HH:MM). Trimmed server-side.
        date:
          type: string
          maxLength: 10
          description: >
            Competition date in DD-MM-YYYY format. Same shape as
            `Tournament.date`: trimmed server-side; rejected with 400 if
            non-empty and not a syntactically valid day in that format
            (Feb 31 etc. → 400) OR if the year falls outside 1900–2100.
        status:
          type: string
          description: >
            Lifecycle state. Set by the server — do not supply on create/update.
            `setup` → not yet started; `draw-ready` → draw generated and available
            for preview, not yet started; `pools` → pools phase active;
            `playoffs` → knockout phase active; `completed` → finished;
            `invalid` → operator-declared invalid, prerequisite for deleting
            an already-started competition.
          enum: [setup, draw-ready, pools, playoffs, completed, invalid, ""]
        mirror:
          type: boolean
        withZekkenName:
          type: boolean
        numberPrefix:
          type: string
        hasParticipantIDs:
          type: boolean
        sourceCompID:
          type: string
          maxLength: 64
          description: >
            For a `playoffs` competition created via POST /playoffs, the ID of
            the mixed source competition whose pool winners seed this playoff.
            The roster is resolved from the source at start time. Empty for all
            other competitions.
        teamMatchType:
          type: string
          description: Team-match scoring model — `fixed` (positions) or `kachinuki` (winner-stays).
          enum: [fixed, kachinuki]
        maxEnchoPeriods:
          type: integer
          description: Maximum number of encho (extended time) periods permitted per match.
        players:
          type: array
          description: >
            Player list. Populated only in viewer responses (`GET /api/viewer/competitions` and
            `GET /api/viewer/competitions/{id}`). Always empty in admin competition responses.
          items:
            $ref: '#/components/schemas/Player'

    Player:
      type: object
      properties:
        id:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 100
        displayName:
          type: string
          maxLength: 50
          description: Display name shown on the bracket and Zekken. Defaults to a sanitized form of `name` when omitted.
        dojo:
          type: string
          maxLength: 100
        metadata:
          type: array
          maxItems: 16
          items:
            type: string
            maxLength: 200
        tag:
          type: string
          maxLength: 200
        seed:
          type: integer
          description: Seed rank (0 = unseeded).
        number:
          type: string
          description: Match number prefix + sequence (e.g. "K1"). Only present when number-prefix is set.

    Participant:
      type: object
      properties:
        id:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 100
        displayName:
          type: string
          maxLength: 50
        dojo:
          type: string
          maxLength: 100
        metadata:
          type: array
          maxItems: 16
          items:
            type: string
            maxLength: 200
        tag:
          type: string
          maxLength: 200

    SeedAssignment:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        seedRank:
          type: integer
          description: 1 = top seed.

    Pool:
      type: object
      properties:
        poolName:
          type: string
        players:
          type: array
          items:
            $ref: '#/components/schemas/Player'

    MatchResult:
      type: object
      properties:
        id:
          type: string
        sideA:
          type: string
          maxLength: 100
        sideB:
          type: string
          maxLength: 100
        winner:
          type: string
          maxLength: 100
        ipponsA:
          type: array
          items:
            type: string
          description: "Ippon types scored by side A (M, K, D, T, H)."
        ipponsB:
          type: array
          items:
            type: string
        hansokuA:
          type: integer
        hansokuB:
          type: integer
        decision:
          type: string
          description: >
            Decision code for the match outcome. Extended set:
            `none`/`""` — no decision recorded; `fought` — resolved by scoring;
            `hikiwake` — draw/tie; `kiken` — withdrawal (legacy, maps to kiken-voluntary);
            `kiken-voluntary` — voluntary withdrawal (FIK Art. 31, permanent);
            `kiken-injury` — injury withdrawal (FIK Art. 30, reinstateable);
            `fusenpai` — forfeit loss; `fusensho` — forfeit win;
            `daihyosen` — resolved by representative bout;
            `kachinuki-exhaustion` — kachinuki team match ended with one side exhausted.
          enum: [none, fought, hikiwake, kiken, kiken-voluntary, kiken-injury, fusenpai, fusensho, daihyosen, kachinuki-exhaustion]
        decisionBy:
          type: string
          description: Which side the decision favours (shiro = white = left, aka = red = right).
          enum: [shiro, aka]
        decisionReason:
          type: string
          maxLength: 200
          description: Free-text operator note for the decision.
        encho:
          $ref: '#/components/schemas/EnchoMetadata'
        status:
          type: string
          enum: [scheduled, running, completed]
        court:
          type: string
          maxLength: 32
        scheduledAt:
          type: string
          maxLength: 32
        subResults:
          type: array
          items:
            $ref: '#/components/schemas/SubMatchResult'
        decidedByHantei:
          type: boolean
          description: >
            True when the winner was declared by referee hantei after a tied encho
            (FIK Art. 7-5 / 29-6). On a bracket-match score request, omitting the field
            preserves the stored value; sending an explicit true/false applies it.

    SubMatchResult:
      type: object
      description: Individual member match result within a team match.
      properties:
        position:
          type: integer
        sideA:
          type: string
          maxLength: 100
        sideB:
          type: string
          maxLength: 100
        ipponsA:
          type: array
          items:
            type: string
        ipponsB:
          type: array
          items:
            type: string
        hansokuA:
          type: integer
        hansokuB:
          type: integer
        winner:
          type: string
          maxLength: 100
        decision:
          type: string
          description: >
            Decision code for this individual sub-match. For numbered bouts:
            `""` (normal victory), `"hikiwake"` (draw/tie), or `"fusensho"`
            (per-bout default win). The daihyosen representative bout
            (`position: -1`) always carries `"daihyosen"` — including when its
            winner is declared by hantei after a tied encho (the frontend emits
            `decision: "daihyosen"` together with `decidedByHantei: true`). The
            server also tolerates `""` or `"fought"` alongside hantei, but
            `"daihyosen"` is the canonical persisted value for the rep bout.
        decidedByHantei:
          type: boolean
          description: >
            True when this sub-bout's winner was declared by referee hantei after a
            tied encho. Valid ONLY for the daihyosen representative bout (`position: -1`)
            AND only when `encho.periodCount > 0`; regular numbered bouts have fixed
            regulation time and are never decided by hantei. The accompanying `decision`
            is `"daihyosen"` (the value the frontend persists for the rep bout); the
            server additionally accepts `""` or `"fought"`. `winner` must be set — the
            server rejects hantei without encho or with any other decision code.
        encho:
          allOf:
            - $ref: '#/components/schemas/EnchoMetadata'
          description: >
            Overtime metadata for this sub-bout. Valid ONLY for the daihyosen
            representative bout (`position: -1`); the server rejects a non-zero
            `periodCount` on any numbered bout (fixed regulation time, no overtime).

    BracketMatch:
      type: object
      properties:
        id:
          type: string
        sideA:
          type: string
          maxLength: 100
        sideB:
          type: string
          maxLength: 100
        winner:
          type: string
          maxLength: 100
        status:
          type: string
          enum: [scheduled, running, completed]
        court:
          type: string
          maxLength: 32
        scheduledAt:
          type: string
          maxLength: 32
        scoreA:
          type: string
        scoreB:
          type: string
        isOverridden:
          type: boolean
        queuePosition:
          type: integer
        decision:
          type: string
          description: Decision code persisted for an elimination-stage match. Same values as `MatchResult.decision`.
        decisionBy:
          type: string
          enum: [shiro, aka]
        decisionReason:
          type: string
          maxLength: 200
        encho:
          $ref: '#/components/schemas/EnchoMetadata'
        decidedByHantei:
          type: boolean
          description: True when the match winner was declared by referee hantei after a tied encho.
        subResults:
          type: array
          description: >
            Per-bout results for a team bracket match, persisted so the score editor
            can restore hantei state and bout-level detail on re-open.
          items:
            $ref: '#/components/schemas/SubMatchResult'

    Bracket:
      type: object
      properties:
        rounds:
          type: array
          items:
            type: array
            items:
              $ref: '#/components/schemas/BracketMatch'

    PlayerStanding:
      type: object
      properties:
        player:
          $ref: '#/components/schemas/Player'
        wins:
          type: integer
        losses:
          type: integer
        draws:
          type: integer
        ipponsGiven:
          type: integer
        ipponsTaken:
          type: integer
        points:
          type: integer
          description: >
            Internal weighted composite sort key — not intended for display.
            Individual formula (×100 for integer arithmetic):
            W×100M − L×1M + D×10K + ipponsGiven×100 − ipponsTaken.
            Team formula:
            W×100B − L×1B + D×10M + IV×100K − IL×10K + IT×1K + PW×100 − PL.
            Use `scoreSummary` for a human-readable breakdown.
        scoreSummary:
          type: string
          description: >
            Human-readable ranking breakdown. Individual format: "W:3 L:1 D:0 | P:5-2".
            Team format: "W:2 L:0 D:1 | IV:8 IL:3 IT:1 | PW:5 PL:3".
        rank:
          type: integer
        isOverridden:
          type: boolean
        individualWins:
          type: integer
        individualLosses:
          type: integer
        individualDraws:
          type: integer
        pointsWon:
          type: integer
        pointsLost:
          type: integer

    ScheduleEntry:
      type: object
      properties:
        matchType:
          type: string
          enum: [pool, bracket, break]
        matchRef:
          type: string
          description: >
            Match identifier (empty for breaks). This value corresponds to the `{mid}` path
            parameter used in match scoring and update endpoints (e.g. PUT /api/competitions/{id}/matches/{mid}/score).
        court:
          type: string
        date:
          type: string
          description: DD-MM-YYYY
        scheduledAt:
          type: string
          description: HH:MM
        status:
          type: string
        isBreak:
          type: boolean
        label:
          type: string
          description: Display label for break entries.

    CompetitionDetail:
      type: object
      description: Full competition state returned by the viewer endpoint.
      properties:
        config:
          $ref: '#/components/schemas/Competition'
        pools:
          type: array
          items:
            $ref: '#/components/schemas/Pool'
        poolMatches:
          type: array
          items:
            $ref: '#/components/schemas/MatchResult'
        standings:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/PlayerStanding'
          description: Map of pool name to ordered standings.
        bracket:
          $ref: '#/components/schemas/Bracket'
        schedule:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleEntry'

    EnchoMetadata:
      type: object
      description: Metadata about extended-time (encho) periods played for a match.
      properties:
        periodCount:
          type: integer
          minimum: 1

    CompetitorStatus:
      type: object
      description: Eligibility status for a single competitor.
      required: [playerId, eligible]
      properties:
        playerId:
          type: string
          maxLength: 64
        eligible:
          type: boolean
        reinstateable:
          type: boolean
          description: >
            True when the competitor can be reinstated (kiken-injury / FIK Art. 30).
            False or absent for voluntary kiken (Art. 31) and fusenpai.
        reason:
          type: string
          maxLength: 200
        matchId:
          type: string
          maxLength: 64
        recordedAt:
          type: string
          format: date-time

    TeamLineup:
      type: object
      description: Per-round lineup assigning team members to positions.
      required: [teamId, competitionId, round, positions]
      properties:
        teamId:
          type: string
        competitionId:
          type: string
        round:
          type: integer
        positions:
          type: object
          additionalProperties:
            type: string
          description: Map of position label to player ID.
        lockedAt:
          type: string
          format: date-time
          nullable: true

    ScheduleEstimate:
      type: object
      description: Result of a stateless schedule duration estimate.
      properties:
        totalDurationMinutes:
          type: integer
        perCourtMinutes:
          type: array
          items:
            type: integer
        ceremonyMinutes:
          type: integer