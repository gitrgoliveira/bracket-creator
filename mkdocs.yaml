site_name: bracket-creator
site_url: https://gitrgoliveira.github.io/bracket-creator/

# Repository
repo_name: gitrgoliveira/bracket-creator
repo_url: https://github.com/gitrgoliveira/bracket-creator

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
  favicon: assets/images/favicon.ico
  icon:
    logo: logo
  logo: assets/images/logo.png
  palette:
    - scheme: default
      primary: 333333
      accent: 333333
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: "#333333"
      accent: "#333333"
      toggle:
        icon: material/brightness-3
        name: Switch to light mode

nav:
  - Home: index.md
  - User guide:
      - Installation: user-guide/getting-started.md
      - Input format: user-guide/input-format.md
      - Web UI: user-guide/web-ui.md
      - Commands:
          - create-pools: user-guide/commands/create-pools.md
          - create-playoffs: user-guide/commands/create-playoffs.md
          - serve: user-guide/commands/serve.md
          - version: user-guide/commands/version.md
  - Developer guide:
      - Code of conduct: dev-guide/code_of_conduct.md
      - Contributing: dev-guide/contributing.md
