openapi: 3.1.0
info:
  title: bracket-creator API
  description: |
    Web API for generating Kendo tournament brackets.

    This spec covers two servers:
    - **Bracket Generator** (`serve` command): Stateless, form-based bracket generation.
    - **Mobile/Admin API** (`mobile-app` command): Stateful REST API for live tournament management.

    The Mobile/Admin API routes under `/api/` (excluding `/api/viewer/`) require the
    `X-Tournament-Password` header for authentication.
  version: 2.1.0

servers:
  - url: http://localhost:8080
    description: Bracket Generator (serve command)
  - url: http://localhost:8081
    description: Mobile/Admin API (mobile-app command)

tags:
  - name: bracket-generator
    description: Stateless bracket/pool Excel generation (serve command)
  - name: tournament
    description: Tournament-level configuration (mobile-app command, requires auth)
  - name: competitions
    description: Competition management (mobile-app command, requires auth)
  - name: participants
    description: Participant and seed management (mobile-app command, requires auth)
  - name: matches
    description: Match scoring and overrides (mobile-app command, requires auth)
  - name: viewer
    description: Public read-only endpoints (mobile-app command, no auth required)
  - name: system
    description: Health and status endpoints

paths:

  # ── Bracket Generator ──────────────────────────────────────────────────────

  /api/parse-participants:
    post:
      tags: [bracket-generator]
      summary: Parse and validate participants
      description: Parses a CSV list of participants and returns a structured list. Detects duplicates.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [playerList]
              properties:
                playerList:
                  type: string
                  description: Newline-separated CSV of players.
                withZekkenName:
                  type: boolean
                  description: Whether the CSV uses the "Name, ZekkenName, Dojo" format.
      responses:
        '200':
          description: Successfully parsed participants.
          content:
            application/json:
              schema:
                type: object
                properties:
                  participants:
                    type: array
                    items:
                      $ref: '#/components/schemas/Participant'
        '400':
          $ref: '#/components/responses/BadRequest'

  /create:
    post:
      tags: [bracket-generator]
      summary: Generate tournament bracket Excel file
      description: Generates an Excel spreadsheet containing the tournament bracket.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [playerList, tournamentType]
              properties:
                playerList:
                  type: string
                tournamentType:
                  type: string
                  enum: [pools, playoffs]
                singleTree:
                  type: string
                  enum: ["on", "off"]
                withZekkenName:
                  type: string
                  enum: ["on", "off"]
                determined:
                  type: string
                  enum: ["on", "off"]
                mirror:
                  type: string
                  enum: ["on", "off"]
                titlePrefix:
                  type: string
                numberPrefix:
                  type: string
                teamMatches:
                  type: integer
                  default: 0
                winnersPerPool:
                  type: integer
                  default: 2
                playersPerPool:
                  type: integer
                  default: 3
                roundRobin:
                  type: string
                  enum: ["on", "off"]
                poolSizeMode:
                  type: string
                  enum: [max, exact]
                courts:
                  type: integer
                  default: 2
                seeds:
                  type: string
                  description: JSON-encoded array of SeedAssignment objects.
                downloadToken:
                  type: string
                  description: Token for polling /api/download-status.
      responses:
        '200':
          description: Excel file containing the generated bracket.
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/download-status:
    get:
      tags: [bracket-generator]
      summary: Check download status
      description: Poll to check if a file generation triggered via /create is complete.
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Download readiness status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean

  /api/status:
    get:
      tags: [system]
      summary: Application status
      description: Returns version and build details (bracket-generator serve command).
      responses:
        '200':
          description: Status information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppStatus'

  # ── System ─────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [system]
      summary: Health check
      description: Returns 200 OK when the mobile-app server is running.
      responses:
        '200':
          description: Server is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/events:
    get:
      tags: [system]
      summary: Server-Sent Events stream
      description: |
        Subscribe to real-time tournament updates via SSE.

        Event types (canonical set defined in `internal/mobileapp/hub.go`):
        - `match_updated` — a match's score/court/scheduledAt changed.
          `data: { competitionId, matchId, ... }`.
        - `competition_started` — a competition transitioned out of `setup`.
          `data: { competitionId }`.
        - `competition_completed` — a competition transitioned to `completed`
          (either via POST /complete or via the auto-complete check after the
          last pool match scored). `data: { competitionId }`.
        - `tournament_updated` — tournament-level config change (a competition
          was created/updated/deleted, reserved slots changed, participants
          updated, etc.). `data: null` — clients should refresh full state.
        - `schedule_updated` — a competition's schedule was saved.
      responses:
        '200':
          description: SSE stream of tournament events.
          content:
            text/event-stream:
              schema:
                type: string

  # ── Tournament (Admin, requires auth) ──────────────────────────────────────

  /api/tournament:
    get:
      tags: [tournament]
      summary: Get tournament configuration
      security:
        - TournamentPassword: []
      responses:
        '200':
          description: Tournament configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tournament'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [tournament]
      summary: Create tournament configuration
      description: |
        Creates a new tournament. Allowed without the `X-Tournament-Password` header when no
        tournament has been configured yet (bootstrap). Once a tournament with a password exists,
        auth is required.

        Validation: `name` is trimmed and must be non-empty after trim (`tournament name is
        required`). `password` must be non-empty (`tournament password is required`) — empty
        Password on disk would let AuthMiddleware's `password != t.Password` check vacuously
        pass for any client sending an empty header. `venue` and `date` are also trimmed but
        may be empty.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tournament'
      responses:
        '201':
          description: Tournament created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tournament'
        '400':
          $ref: '#/components/responses/BadRequest'
    put:
      tags: [tournament]
      summary: Update tournament configuration
      description: |
        Updates tournament config. Also allowed without auth during bootstrap (same condition
        as POST — when no tournament with a password exists yet).

        Validation matches POST for `name` (rejected if empty after trim).

        **Password preserve semantics**: when the request body omits `password` or sends an
        empty string, the server preserves the currently-stored password. This matches the
        admin UI's `password: pass || undefined` pattern ("leave blank to keep current").
        If after the preserve step the password is STILL empty (legacy on-disk state from
        before this rule was enforced), the request is rejected with 400
        (`tournament password is required`) to force the admin to set a password rather than
        silently allow the empty-stored-password vacuous-pass scenario.
      security:
        - TournamentPassword: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tournament'
      responses:
        '200':
          description: Tournament updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tournament'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/tournament/import:
    post:
      tags: [tournament]
      summary: Import tournament configuration
      description: |
        Imports a tournament structure from a set of files (manifest.yaml, participants.csv, etc.)
        via a multipart form upload. The server accepts files under any field name(s).
        One of the uploaded files must be named `manifest.yaml` (or `.yml`); it declares
        which competitions to create and which participant/seed CSV files to associate with each.
      security:
        - TournamentPassword: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              description: >
                Any number of file fields. The field names are ignored — all uploaded files are
                indexed by filename. Include `manifest.yaml` plus any referenced CSV files.
              additionalProperties:
                type: string
                format: binary
      responses:
        '200':
          description: |
            Import result. Each manifest entry produces one result row;
            partial success is allowed (one row's `error` doesn't abort
            the others). `name` is the trimmed value (matches what's
            saved to disk; the manifest's raw padded value is normalized
            before save and before this response is constructed).
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id: {type: string}
                        name:
                          type: string
                          description: Trimmed competition name as persisted.
                        participantCount: {type: integer}
                        seedCount: {type: integer}
                        error:
                          type: string
                          description: |
                            Per-row error if the import couldn't proceed.
                            Common values: `missing id`, `competition name is required`,
                            `competition ID contains invalid characters ...`,
                            `competition ID "..." already exists`,
                            `save competition: ...`,
                            `parse participants: ...`. Empty when the row
                            imported successfully.

  # ── Competitions (Admin, requires auth) ────────────────────────────────────

  /api/competitions:
    get:
      tags: [competitions]
      summary: List competitions
      description: Returns an empty array `[]` when no competitions exist (never `null`).
      security:
        - TournamentPassword: []
      responses:
        '200':
          description: Array of competitions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Competition'
    post:
      tags: [competitions]
      summary: Create competition
      description: |
        Creates a new competition. The `id` field is optional — when omitted the server
        derives a URL-friendly slug from `name` (lowercase, spaces to hyphens, max 64 chars).

        Validation (returns 400 with explanatory message):
        - `name` is trimmed and must be non-empty (`competition name is required`).
        - `name` must be unique (case-insensitive) across competitions
          (`competition name "X" already exists`).
        - When `id` is omitted AND `name` slugs to empty (no alphanumerics)
          → 400 (`competition ID is required (could not derive one from name)`).
        - Provided `id` must match the path-parameter pattern (see CompetitionId).

        String fields are trimmed server-side: `name`, `numberPrefix`, `kind`,
        `format`, `poolSizeMode`, `startTime`, `date`.
      security:
        - TournamentPassword: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Competition'
      responses:
        '201':
          description: Competition created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competition'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/competitions/{id}:
    parameters:
      - $ref: '#/components/parameters/CompetitionId'
    get:
      tags: [competitions]
      summary: Get competition
      security:
        - TournamentPassword: []
      responses:
        '200':
          description: Competition details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competition'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [competitions]
      summary: Update competition
      description: |
        Replaces the competition record (body-replace semantics). The server
        trims string fields (`name`, `numberPrefix`, `kind`, `format`,
        `poolSizeMode`, `startTime`, `date`) and rejects the request with
        400 if `name` is empty after trim or if it collides
        (case-insensitive) with another competition's name. Status field
        is server-managed — see Competition.status for transition
        endpoints; sending `status` here is accepted but bypasses the
        invariants the dedicated /start, /complete, /invalidate endpoints
        enforce.
      security:
        - TournamentPassword: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Competition'
      responses:
        '200':
          description: Competition updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [competitions]
      summary: Delete competition
      description: |
        Idempotent — returns 204 even when the competition does not exist.
        Allowed in any non-in-progress state (`setup`, `pending`, `completed`,
        `invalid`, or unset). In-progress competitions (`pools`/`playoffs`)
        must first be invalidated via `POST /api/competitions/{id}/invalidate`.
      security:
        - TournamentPassword: []
      responses:
        '204':
          description: Competition deleted (or did not exist).
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Competition is in progress and must be invalidated first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/invalidate:
    post:
      tags: [competitions]
      summary: Mark in-progress competition as invalid
      description: |
        Transitions a competition from `pools` or `playoffs` to `invalid`,
        which is the prerequisite for deletion of an already-started
        competition. Returns 400 if the competition is not in an in-progress
        state.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '200':
          description: Competition marked as invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/start:
    post:
      tags: [competitions]
      summary: Start competition
      description: Generates pools/bracket from the saved participant list and seeds.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '200':
          description: Competition started.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/complete:
    post:
      tags: [competitions]
      summary: Complete competition
      description: |
        Transitions a competition from `pools` or `playoffs` status to `completed`.
        Returns 400 if the competition is not in a completable state.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '200':
          description: Competition marked as completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/playoffs:
    post:
      tags: [competitions]
      summary: Create linked playoff competition
      description: |
        Creates a new `playoffs`-format competition linked to this pools competition.
        The server automatically:
        - Derives a name (`<source name> - Playoffs`) and ID.
        - Calculates the expected number of promoted players (`numPools × poolWinners`) and
          creates the corresponding reserved slots, each backed by a placeholder participant.

        Use this instead of manually creating a competition and wiring reserved slots.
        Returns 400 if the source competition is not in `pools` format.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '201':
          description: Playoff competition created and linked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Competition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/export:
    get:
      tags: [competitions]
      summary: Export competition as Excel
      description: Downloads an .xlsx file with the current bracket/pools state.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '200':
          description: Excel file.
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/overrides:
    delete:
      tags: [competitions]
      summary: Reset all overrides
      description: Clears all manual rank and bracket-winner overrides for this competition.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '204':
          description: Overrides reset.

  /api/competitions/{id}/reserved-slots:
    parameters:
      - $ref: '#/components/parameters/CompetitionId'
    get:
      tags: [competitions]
      summary: Get reserved slots
      security:
        - TournamentPassword: []
      responses:
        '200':
          description: List of reserved slots.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReservedSlot'
    post:
      tags: [competitions]
      summary: Add reserved slot
      description: >
        Creates a reserved slot and a matching placeholder participant. If a slot for the same
        `sourceCompID`+`sourceRank` pair already exists it is returned as-is (idempotent).
      security:
        - TournamentPassword: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceCompID, sourceRank]
              properties:
                sourceCompID:
                  type: string
                  description: ID of the competition to pull the player from.
                sourceRank:
                  type: integer
                  description: Rank in the source competition (1-based).
      responses:
        '201':
          description: Reserved slot created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservedSlot'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/competitions/{id}/reserved-slots/{slotID}:
    parameters:
      - $ref: '#/components/parameters/CompetitionId'
      - in: path
        name: slotID
        required: true
        schema:
          type: string
    delete:
      tags: [competitions]
      summary: Remove reserved slot
      security:
        - TournamentPassword: []
      responses:
        '204':
          description: Reserved slot removed.

  /api/competitions/{id}/schedule:
    put:
      tags: [competitions]
      summary: Save schedule
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/ScheduleEntry'
      responses:
        '200':
          description: Schedule saved.

  /api/competitions/{id}/pools/{poolId}/override-rank:
    put:
      tags: [competitions]
      summary: Override pool rank
      description: Manually set a player's rank within a pool, overriding the computed value.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - in: path
          name: poolId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [playerName, rank]
              properties:
                playerName:
                  type: string
                rank:
                  type: integer
      responses:
        '200':
          description: Rank override saved.

  # ── Participants & Seeds (Admin, requires auth) ────────────────────────────

  /api/competitions/{id}/participants:
    get:
      tags: [participants]
      summary: Get participants
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '200':
          description: List of players.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Player'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [participants]
      summary: Set participants (JSON)
      description: Replaces the current participants list for the competition with the provided JSON.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                players:
                  type: array
                  items:
                    $ref: '#/components/schemas/Participant'
      responses:
        '200':
          description: Participants successfully updated.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Player'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/competitions/{id}/seeds:
    get:
      tags: [participants]
      summary: Get seed assignments
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '200':
          description: Current seed assignments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SeedAssignment'
    put:
      tags: [participants]
      summary: Save seed assignments
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/SeedAssignment'
      responses:
        '200':
          description: Seeds saved.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SeedAssignment'

  # ── Matches (Admin, requires auth) ─────────────────────────────────────────

  /api/competitions/{id}/matches/{mid}/score:
    put:
      tags: [matches]
      summary: Record match result
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchResult'
      responses:
        '200':
          description: Result recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResult'

  /api/competitions/{id}/matches/{mid}/court:
    put:
      tags: [matches]
      summary: Assign match to court
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [court]
              properties:
                court:
                  type: string
                  example: A
      responses:
        '200':
          description: Court updated.

  /api/competitions/{id}/matches/{mid}/override-winner:
    put:
      tags: [matches]
      summary: Override bracket winner
      description: Manually set the winner of a bracket match, bypassing score calculation.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [winnerName]
              properties:
                winnerName:
                  type: string
      responses:
        '200':
          description: Winner overridden.

  /api/competitions/{id}/matches/{mid}/time:
    put:
      tags: [matches]
      summary: Set match scheduled time
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scheduledAt]
              properties:
                scheduledAt:
                  type: string
                  description: HH:MM scheduled time.
                  example: "14:30"
      responses:
        '200':
          description: Time updated.

  /api/competitions/{id}/matches/bulk-score:
    post:
      tags: [matches]
      summary: Bulk record match results
      description: >
        Records multiple match results in a single request. Processes each entry independently;
        partial success is allowed. Returns a count of successful updates and a list of errors
        for any that failed.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/MatchResult'
      responses:
        '200':
          description: Bulk operation result (may include partial failures).
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded:
                    type: integer
                    description: Number of matches successfully scored.
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        matchId:
                          type: string
                        error:
                          type: string

  /api/competitions/{id}/matches/{mid}/quick-score:
    put:
      tags: [matches]
      summary: Quick-score a team match
      description: >
        Simplified scoring for team matches. Provide the individual win/loss/draw counts
        and the server determines the team winner and synthesises SubResults so that
        standings IV/IL/IT counts are updated correctly. Use the full `/score` endpoint
        when you have per-member ippon data.
      security:
        - TournamentPassword: []
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sideA, sideB]
              properties:
                sideA:
                  type: string
                  description: Team A name.
                sideB:
                  type: string
                  description: Team B name.
                teamAWins:
                  type: integer
                  description: Number of individual bouts won by team A.
                teamBWins:
                  type: integer
                  description: Number of individual bouts won by team B.
                draws:
                  type: integer
                  description: Number of individual bouts that were draws.
      responses:
        '200':
          description: Match result recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResult'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ── Viewer (Public, no auth) ───────────────────────────────────────────────

  /api/viewer/tournament:
    get:
      tags: [viewer]
      summary: Get public tournament info
      description: Returns tournament details with password field redacted.
      responses:
        '200':
          description: Public tournament info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tournament'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/viewer/competitions:
    get:
      tags: [viewer]
      summary: List competitions with players
      description: Returns all competitions, each with their player list populated.
      responses:
        '200':
          description: List of competitions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Competition'

  /api/viewer/competitions/{id}:
    get:
      tags: [viewer]
      summary: Get full competition state
      description: Returns config, pools, pool matches, standings, bracket, and schedule.
      parameters:
        - $ref: '#/components/parameters/CompetitionId'
      responses:
        '200':
          description: Full competition state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompetitionDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/viewer/schedule:
    get:
      tags: [viewer]
      summary: Get combined schedule for all competitions
      responses:
        '200':
          description: Aggregated schedule entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduleEntry'

components:

  securitySchemes:
    TournamentPassword:
      type: apiKey
      in: header
      name: X-Tournament-Password
      description: |
        Tournament admin password. Required for all `/api/` routes except
        `/api/viewer/`, `/api/events`, and the bootstrap PUT/POST
        `/api/tournament` while no tournament has been configured yet.

        Header value must exactly equal the stored tournament password
        (exact-string match; no trimming applied to either side).

        Defense-in-depth: if the stored tournament password is somehow
        empty (e.g. legacy file from before the POST guard was added),
        AuthMiddleware returns 403 (`tournament misconfigured: password
        is not set`) for ALL requests rather than letting the
        `header != stored` check vacuously pass for empty header.

        Recovery from this state requires **out-of-band repair**: the
        bootstrap PUT/POST `/api/tournament` exception only applies
        when the loaded record is `nil` or matches the literal
        `Name == "New Tournament" && Password == ""` default — a
        real-named legacy record with empty Password is locked out by
        the 403 fail-closed branch. Operator must stop the server,
        edit `tournament.md` to either delete it (forces fresh
        bootstrap) or set a non-empty `password:` field in the YAML
        front-matter, then restart.

  parameters:
    CompetitionId:
      in: path
      name: id
      required: true
      schema:
        type: string
        pattern: '^[a-zA-Z0-9][a-zA-Z0-9_-]*$'
        maxLength: 64
      description: |
        Competition slug/ID (e.g. "mens-individual"). Must start with an
        alphanumeric character, contain only alphanumerics / hyphens /
        underscores, and be at most 64 chars. Validated server-side via
        `requireValidCompID`; invalid IDs return 400
        (`competition ID contains invalid characters` / `competition ID too long` /
        `competition ID cannot be empty`). The validation is a path-traversal
        defense: without it, an `id` like `../../../etc/passwd` would resolve
        through `filepath.Clean(filepath.Join(...))` and escape the data
        directory.
    MatchId:
      in: path
      name: mid
      required: true
      schema:
        type: string
      description: Match ID (e.g. "pool-a-0" or "bracket-r1-m0").

  responses:
    BadRequest:
      description: Invalid input.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Action not permitted in current state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:

    Error:
      type: object
      properties:
        error:
          type: string

    AppStatus:
      type: object
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
        buildDate:
          type: string
        goVersion:
          type: string
        osArch:
          type: string

    Tournament:
      type: object
      properties:
        name:
          type: string
          description: Tournament name. Trimmed server-side; rejected with 400 if empty after trim.
        date:
          type: string
          description: >
            Event date in DD-MM-YYYY format. Trimmed server-side; rejected
            with 400 if non-empty and not a syntactically valid day in
            that format (Feb 31 etc. → 400). The web frontend converts
            the HTML `<input type="date">` ISO output to DMY at the input
            boundary; direct API clients send DMY directly.
        venue:
          type: string
          description: Venue name. Trimmed server-side.
        courts:
          type: array
          items:
            type: string
          description: Court labels (e.g. ["A", "B"]). Each label is a single character; 26-court cap (A–Z).
        password:
          type: string
          description: >
            Admin password. Required (non-empty) on POST /tournament — an
            empty Password on disk would let AuthMiddleware's
            `password != t.Password` check vacuously pass for any client
            sending an empty `X-Tournament-Password` header.

            On PUT /tournament: omitting the field or sending an empty
            string preserves the currently-stored password ("leave blank
            to keep current"). Sending a non-empty string updates it.

            Omitted from viewer responses (`/api/viewer/tournament`).

    Competition:
      type: object
      properties:
        id:
          type: string
          description: >
            Unique competition identifier. Must start with an alphanumeric
            character, contain only alphanumerics / hyphens / underscores,
            and be at most 64 chars (same rule as the `:id` path parameter
            — see CompetitionId).
            Optional on POST — the server derives a slug from `name` when omitted.
        name:
          type: string
          description: >
            Competition name. Trimmed server-side and rejected with 400
            (`competition name is required`) if empty after trim.
            Uniqueness check (case-insensitive) on POST/PUT — duplicate
            names return 400 (`competition name "X" already exists`).
        kind:
          type: string
          description: "individual or team"
          enum: [individual, team]
        format:
          type: string
          description: "pools or playoffs"
          enum: [pools, playoffs]
        teamSize:
          type: integer
          description: Number of members per team (0 for individual).
        poolSize:
          type: integer
        poolSizeMode:
          type: string
          enum: [max, exact]
        poolWinners:
          type: integer
        roundRobin:
          type: boolean
        courts:
          type: array
          items:
            type: string
        startTime:
          type: string
          description: First-match start time (HH:MM). Trimmed server-side.
        date:
          type: string
          description: >
            Competition date in DD-MM-YYYY format. Same shape as
            `Tournament.date`. Trimmed server-side; rejected with 400 if
            non-empty and not a syntactically valid day in that format
            (Feb 31 etc. → 400).
        status:
          type: string
          description: >
            Lifecycle state. Set by the server — do not supply on create/update.
            `setup` → not yet started; `pools` → pools phase active;
            `playoffs` → knockout phase active; `completed` → finished;
            `invalid` → operator-declared invalid, prerequisite for deleting
            an already-started competition.
          enum: [setup, pools, playoffs, completed, invalid, ""]
        mirror:
          type: boolean
        withZekkenName:
          type: boolean
        numberPrefix:
          type: string
        hasParticipantIDs:
          type: boolean
        players:
          type: array
          description: >
            Player list. Populated only in viewer responses (`GET /api/viewer/competitions` and
            `GET /api/viewer/competitions/{id}`). Always empty in admin competition responses.
          items:
            $ref: '#/components/schemas/Player'

    Player:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        displayName:
          type: string
          description: Display name shown on the bracket and Zekken. Defaults to a sanitized form of `name` when omitted.
        dojo:
          type: string
        metadata:
          type: array
          items:
            type: string
        tag:
          type: string
        seed:
          type: integer
          description: Seed rank (0 = unseeded).
        number:
          type: string
          description: Match number prefix + sequence (e.g. "K1"). Only present when number-prefix is set.

    Participant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        displayName:
          type: string
        dojo:
          type: string
        metadata:
          type: array
          items:
            type: string
        tag:
          type: string

    SeedAssignment:
      type: object
      properties:
        name:
          type: string
        seedRank:
          type: integer
          description: 1 = top seed.

    Pool:
      type: object
      properties:
        poolName:
          type: string
        players:
          type: array
          items:
            $ref: '#/components/schemas/Player'

    MatchResult:
      type: object
      properties:
        id:
          type: string
        sideA:
          type: string
        sideB:
          type: string
        winner:
          type: string
        ipponsA:
          type: array
          items:
            type: string
          description: "Ippon types scored by side A (M, K, D, T, H)."
        ipponsB:
          type: array
          items:
            type: string
        hansokuA:
          type: integer
        hansokuB:
          type: integer
        decision:
          type: string
          description: >
            Decision code for the match outcome. Valid values:
            `""` — normal victory (winner field determines the result);
            `"hikiwake"` — draw/tie, recorded when the operator enters 'X' in the vs column
            or when both sides finish with equal scores.
            Note: encho (extended time) is a play mechanism, not a decision value — a match
            that goes to encho still resolves as a normal victory or hikiwake.
            For individual sub-matches within team matches see `SubMatchResult.decision`.
        status:
          type: string
          enum: [scheduled, running, completed]
        court:
          type: string
        scheduledAt:
          type: string
        subResults:
          type: array
          items:
            $ref: '#/components/schemas/SubMatchResult'

    SubMatchResult:
      type: object
      description: Individual member match result within a team match.
      properties:
        position:
          type: integer
        sideA:
          type: string
        sideB:
          type: string
        ipponsA:
          type: array
          items:
            type: string
        ipponsB:
          type: array
          items:
            type: string
        hansokuA:
          type: integer
        hansokuB:
          type: integer
        winner:
          type: string
        decision:
          type: string
          description: >
            Decision code for this individual sub-match. Same values as `MatchResult.decision`:
            `""` (normal victory) or `"hikiwake"` (draw/tie).

    BracketMatch:
      type: object
      properties:
        id:
          type: string
        sideA:
          type: string
        sideB:
          type: string
        winner:
          type: string
        status:
          type: string
          enum: [scheduled, running, completed]
        court:
          type: string
        scheduledAt:
          type: string
        scoreA:
          type: string
        scoreB:
          type: string
        isOverridden:
          type: boolean

    Bracket:
      type: object
      properties:
        rounds:
          type: array
          items:
            type: array
            items:
              $ref: '#/components/schemas/BracketMatch'

    PlayerStanding:
      type: object
      properties:
        player:
          $ref: '#/components/schemas/Player'
        wins:
          type: integer
        losses:
          type: integer
        draws:
          type: integer
        ipponsGiven:
          type: integer
        ipponsTaken:
          type: integer
        points:
          type: integer
          description: >
            Internal weighted composite sort key — not intended for display.
            Individual formula (×100 for integer arithmetic):
            W×100M − L×1M + D×10K + ipponsGiven×100 − ipponsTaken.
            Team formula:
            W×100B − L×1B + D×10M + IV×100K − IL×10K + IT×1K + PW×100 − PL.
            Use `scoreSummary` for a human-readable breakdown.
        scoreSummary:
          type: string
          description: >
            Human-readable ranking breakdown. Individual format: "W:3 L:1 D:0 | P:5-2".
            Team format: "W:2 L:0 D:1 | IV:8 IL:3 IT:1 | PW:5 PL:3".
        rank:
          type: integer
        isOverridden:
          type: boolean
        individualWins:
          type: integer
        individualLosses:
          type: integer
        individualDraws:
          type: integer
        pointsWon:
          type: integer
        pointsLost:
          type: integer

    ScheduleEntry:
      type: object
      properties:
        matchType:
          type: string
          enum: [pool, bracket, break]
        matchRef:
          type: string
          description: >
            Match identifier (empty for breaks). This value corresponds to the `{mid}` path
            parameter used in match scoring and update endpoints (e.g. PUT /api/competitions/{id}/matches/{mid}/score).
        court:
          type: string
        date:
          type: string
          description: DD-MM-YYYY
        scheduledAt:
          type: string
          description: HH:MM
        status:
          type: string
        isBreak:
          type: boolean
        label:
          type: string
          description: Display label for break entries.

    CompetitionDetail:
      type: object
      description: Full competition state returned by the viewer endpoint.
      properties:
        config:
          $ref: '#/components/schemas/Competition'
        pools:
          type: array
          items:
            $ref: '#/components/schemas/Pool'
        poolMatches:
          type: array
          items:
            $ref: '#/components/schemas/MatchResult'
        standings:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/PlayerStanding'
          description: Map of pool name to ordered standings.
        bracket:
          $ref: '#/components/schemas/Bracket'
        schedule:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleEntry'
        reservedSlots:
          type: array
          items:
            $ref: '#/components/schemas/ReservedSlot'

    ReservedSlot:
      type: object
      properties:
        id:
          type: string
        participantID:
          type: string
        sourceCompID:
          type: string
        sourceRank:
          type: integer