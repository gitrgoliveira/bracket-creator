name: Goreleaser

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Install each nfpm package in its native distro and run the binary.
      # Runs after publish, so a failure here flags a broken package on the
      # release rather than blocking it; the pre-merge gate is the local
      # `goreleaser release --snapshot --clean` + container install check.
      - name: Smoke test Linux packages (amd64)
        run: |
          set -euo pipefail
          shopt -s nullglob
          deb=(dist/*amd64*.deb) rpm=(dist/*x86_64*.rpm) apk=(dist/*x86_64*.apk)
          if [ ${#deb[@]} -ne 1 ] || [ ${#rpm[@]} -ne 1 ] || [ ${#apk[@]} -ne 1 ]; then
            echo "::error::expected exactly one amd64 deb/rpm/apk in dist/, found deb=${#deb[@]} rpm=${#rpm[@]} apk=${#apk[@]}"
            exit 1
          fi
          # The slim image's dpkg path-exclude filter strips manpages/docs at
          # unpack time; remove it so the test sees the package's real payload.
          docker run --rm -v "$PWD/dist:/dist:ro" debian:stable-slim bash -c \
            "rm -f /etc/dpkg/dpkg.cfg.d/docker \
             && apt-get update -qq >/dev/null && apt-get install -qqy /dist/$(basename "${deb[0]}") >/dev/null \
             && bracket-creator version \
             && test -f /usr/share/bash-completion/completions/bracket-creator \
             && test -f /usr/share/man/man1/bracket-creator.1.gz"
          docker run --rm -v "$PWD/dist:/dist:ro" fedora:latest bash -c \
            "dnf install -qy /dist/$(basename "${rpm[0]}") >/dev/null && bracket-creator version"
          docker run --rm -v "$PWD/dist:/dist:ro" alpine:latest sh -c \
            "apk add --allow-untrusted -q /dist/$(basename "${apk[0]}") && bracket-creator version"

  homebrew:
    name: Bump Homebrew formula
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      # The tap formula (gitrgoliveira/homebrew-tap) builds from source, so a
      # release only needs its `url` + top-level `sha256` repointed at the new
      # tag. GoReleaser's `brews` section is NOT used on purpose: it would
      # replace the hand-maintained from-source formula (sandbox-safe Preact
      # resource staging, esbuild JSX compile, embedded-asset test block) with
      # a generated binary formula. The resource sha256 pins further down the
      # file only change when the vendor URLs in the Makefile change; this job
      # never touches them.
      - name: Push url/sha256 bump to gitrgoliveira/homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "$TAG" in
            *-*)
              echo "Prerelease tag ${TAG}; skipping Homebrew bump."
              exit 0
              ;;
          esac
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not set. Create a fine-grained PAT with contents:write on gitrgoliveira/homebrew-tap and add it as a repo secret, or bump Formula/bracket-creator.rb manually (url + sha256)."
            exit 1
          fi
          curl -fsSL "https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz" -o src.tar.gz
          SHA="$(sha256sum src.tar.gz | cut -d' ' -f1)"
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/gitrgoliveira/homebrew-tap.git" tap
          cd tap
          FORMULA=Formula/bracket-creator.rb
          # Anchor both edits to their exact lines and verify each landed
          # before pushing, so a formula-format drift aborts the job instead
          # of shipping a half-edited formula.
          sed -i -E "s|^(  url \".*/archive/refs/tags/)v[^\"]*(\.tar\.gz\")$|\1${TAG}\2|" "$FORMULA"
          if ! grep -Fq "/archive/refs/tags/${TAG}.tar.gz\"" "$FORMULA"; then
            echo "::error::Formula url line did not match the expected format; aborting before touching sha256. Bump ${FORMULA} manually."
            exit 1
          fi
          sed -i -E "0,/^  sha256 \"[0-9a-f]{64}\"/s//  sha256 \"${SHA}\"/" "$FORMULA"
          if ! grep -Fq "sha256 \"${SHA}\"" "$FORMULA"; then
            echo "::error::Formula sha256 line did not match the expected format; aborting. Bump ${FORMULA} manually."
            exit 1
          fi
          if git diff --quiet; then
            echo "Formula already at ${TAG}; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA"
          git commit -m "Bump bracket-creator to ${TAG}"
          git push origin HEAD:main
